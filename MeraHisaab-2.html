<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#FF6B00"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="मेरा हिसाब"/>
<title>मेरा हिसाब 🔒</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{background:#FFF8F0;font-family:'Noto Sans Devanagari','Segoe UI',sans-serif;color:#1C1917;overscroll-behavior:none}
button,input,select{font-family:'Noto Sans Devanagari','Segoe UI',sans-serif}

/* SPLASH */
#splash{position:fixed;inset:0;background:linear-gradient(160deg,#FF6B00,#CC4400);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.sp-logo{font-size:64px;animation:pop .4s}
@keyframes pop{0%{transform:scale(.5)}100%{transform:scale(1)}}
.sp-title{color:#fff;font-size:30px;font-family:Georgia,serif}
.sp-sub{color:#FFE4C4;font-size:14px}
.spin{width:32px;height:32px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite;margin-top:16px}
@keyframes sp{to{transform:rotate(360deg)}}

/* PIN SCREEN */
#pin-screen{position:fixed;inset:0;background:linear-gradient(160deg,#FF6B00,#CC4400);z-index:998;display:none;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px}
.pin-logo{font-size:52px;margin-bottom:6px}
.pin-title{color:#fff;font-size:26px;font-family:Georgia,serif;margin-bottom:4px}
.pin-sub{color:#FFE4C4;font-size:13px;margin-bottom:32px;text-align:center;line-height:1.5}
.pin-dots{display:flex;gap:16px;margin-bottom:28px}
.dot{width:18px;height:18px;border-radius:50%;border:2px solid #FFE4C4;background:transparent;transition:.2s}
.dot.filled{background:#fff;border-color:#fff}
.dot.err{background:#FF6B6B;border-color:#FF6B6B;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px}
.key{background:rgba(255,255,255,.15);border:none;border-radius:16px;padding:18px 0;font-size:24px;font-weight:700;color:#fff;cursor:pointer}
.key:active{background:rgba(255,255,255,.35);transform:scale(.94)}
.key.zero{grid-column:2}
.key.del{background:rgba(255,100,100,.2);color:#FFD0D0}
.pin-err{color:#FFD0D0;font-size:13px;margin-top:10px;height:18px;text-align:center}
.pin-links{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap;justify-content:center}
.plink{color:#FFE4C4;font-size:12px;text-decoration:underline;cursor:pointer;background:none;border:none}

/* SYNC BAR */
.sync-bar{font-size:11px;color:#FFE4C4;margin-top:5px;display:flex;align-items:center;gap:5px}
.sdot{width:7px;height:7px;border-radius:50%;background:#4ADE80;flex-shrink:0}
.sdot.ing{background:#FCD34D;animation:pulse .8s infinite}
.sdot.off{background:#F87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* APP */
#app-wrap{display:none;max-width:480px;margin:0 auto;min-height:100vh}
.page{padding-bottom:80px;min-height:100vh}
.hdr{background:linear-gradient(135deg,#FF6B00,#CC5500);padding:28px 20px 18px;border-radius:0 0 28px 28px;margin-bottom:18px;position:relative}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start}
.hdr-btn{background:rgba(255,255,255,.2);border:none;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer;color:#fff}
.card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px #FF6B0015;border:1px solid #FFE4C4;margin-bottom:14px}
.card-g{background:linear-gradient(135deg,#16A34A,#15803D);color:#fff}
.px{padding:0 16px}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1.5px solid #FFE4C4;display:flex;z-index:50}
.nb{flex:1;padding:10px 0;background:transparent;border:none;cursor:pointer;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:2px;color:#78716C}
.nb.on{color:#FF6B00;font-weight:700}
.ni{font-size:20px}
.mov{position:fixed;inset:0;background:#00000060;z-index:100;display:flex;align-items:flex-end;justify-content:center}
.mbox{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:24px;max-height:90vh;overflow-y:auto}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.mcls{background:#F5F5F5;border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:18px}
.fl{font-size:13px;color:#78716C;font-weight:600;display:block;margin-bottom:4px;margin-top:12px}
.fi{width:100%;border:1.5px solid #FFE4C4;border-radius:10px;padding:10px 12px;font-size:15px;color:#1C1917;background:#FFF8F0;outline:none}
.fi:focus{border-color:#FF6B00}
.btn{border-radius:12px;padding:10px 20px;font-weight:700;font-size:15px;cursor:pointer}
.bp{background:#FF6B00;color:#fff;border:2px solid #FF6B00}
.bg{background:#16A34A;color:#fff;border:2px solid #16A34A}
.br{background:#DC2626;color:#fff;border:2px solid #DC2626}
.bfw{width:100%;margin-top:10px}
.bdg{padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.ftabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.ftab{padding:7px 14px;border-radius:20px;font-weight:700;font-size:13px;cursor:pointer;border:2px solid #FF6B00;background:transparent;color:#FF6B00}
.ftab.on{background:#FF6B00;color:#fff}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #FFE4C4}
.rmeta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;align-items:center}
.arow{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.sbtn{font-size:11px;background:#FF6B0020;color:#FF6B00;border:none;border-radius:8px;padding:3px 8px;cursor:pointer;font-weight:700}
.shbtn{font-size:11px;background:#0EA5E920;color:#0EA5E9;border:none;border-radius:8px;padding:3px 8px;cursor:pointer;font-weight:700}
.alr{background:#FEF2F2;border:1.5px solid #FECACA;border-radius:14px;padding:14px;margin-bottom:14px}
.si{width:100%;border:1.5px solid #FFE4C4;border-radius:10px;padding:10px 12px;font-size:14px;background:#FFF8F0;outline:none;margin-bottom:10px}
.empty{text-align:center;padding:40px;color:#78716C}
.sb{border-radius:12px;padding:12px}
.sg{background:#F0FDF4;border:1.5px solid #BBF7D0}
.sr{background:#FEF2F2;border:1.5px solid #FECACA}
.sl{font-size:12px;color:#78716C}
.sv{font-weight:800;font-size:20px}
.ob{font-size:11px;background:#FEE2E2;color:#DC2626;padding:1px 6px;border-radius:8px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1C1917;color:#fff;padding:12px 20px;border-radius:20px;font-size:13px;z-index:300;max-width:90vw;text-align:center;pointer-events:none}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="sp-logo">📒</div>
  <h2 class="sp-title">मेरा हिसाब</h2>
  <p class="sp-sub">आपका पैसा, आपका हिसाब</p>
  <div class="spin"></div>
</div>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="pin-logo">📒</div>
  <h2 class="pin-title">मेरा हिसाब</h2>
  <p class="pin-sub" id="pin-msg">अपना PIN डालें</p>
  <div class="pin-dots">
    <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
  </div>
  <div class="keypad">
    <button class="key" data-k="1">1</button><button class="key" data-k="2">2</button><button class="key" data-k="3">3</button>
    <button class="key" data-k="4">4</button><button class="key" data-k="5">5</button><button class="key" data-k="6">6</button>
    <button class="key" data-k="7">7</button><button class="key" data-k="8">8</button><button class="key" data-k="9">9</button>
    <button class="key zero" data-k="0">0</button><button class="key del" id="del-btn">⌫</button>
  </div>
  <p class="pin-err" id="pin-err"></p>
  <div class="pin-links">
    <button class="plink" id="change-pin-btn">🔑 PIN बदलें</button>
    <button class="plink" id="reset-btn">⚠️ Data Reset करें</button>
  </div>
</div>

<!-- APP -->
<div id="app-wrap">
  <div id="app"></div>
</div>

<script type="module">
import { initializeApp }     from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged }
                              from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, onValue, off }
                              from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ══════════════════════════════════════
// 🔧 APNA CONFIG YAHAN DAALO
// ══════════════════════════════════════
const FC = {
  apiKey:            "APNA_API_KEY",
  authDomain:        "APNA_PROJECT.firebaseapp.com",
  projectId:         "APNA_PROJECT_ID",
  storageBucket:     "APNA_PROJECT.appspot.com",
  messagingSenderId: "APNA_SENDER_ID",
  appId:             "APNA_APP_ID",
  databaseURL:       "https://APNA_PROJECT_ID-default-rtdb.firebaseio.com"
};
// ══════════════════════════════════════

const fapp = initializeApp(FC);
const auth = getAuth(fapp);
const db   = getDatabase(fapp);

// ── Helpers ───────────────────────────
function today(){ return new Date().toISOString().split('T')[0]; }
function uid(){ return Date.now()+'_'+Math.random().toString(36).slice(2,6); }
function fmtDate(d){ try{return new Date(d).toLocaleDateString('hi-IN',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return d||'';} }
function fmtAmt(n){ return '₹'+Math.abs(Number(n)||0).toLocaleString('en-IN'); }
function bdg(c,t){ return `<span class="bdg" style="background:${c}20;color:${c}">${t}</span>`; }
function toast(m){ const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),3000); }

// ── State ─────────────────────────────
let uid_key = 'mh_uid';
let pin_key  = 'mh_pin';
let pinBuf='', pinMode='enter', pinTemp='';
let syncSt='synced';
let listeners=[];
let S={ tab:'dashboard', udhars:[], pocket:[], reminders:[], modal:null, settleItem:null, udharFilter:'active', udharSearch:'', historyType:'all', pocketDate:today() };
let mf={};
let FB_UID='';

// ── Firebase DB ───────────────────────
function uref(path){ return ref(db,`users/${FB_UID}/${path}`); }

function setSyncing(){ syncSt='syncing'; refreshSyncDot(); }
function setSynced(){  syncSt='synced';  refreshSyncDot(); }
function setOffline(){ syncSt='offline'; refreshSyncDot(); }
function refreshSyncDot(){
  const d=document.getElementById('sdot'), t=document.getElementById('stxt');
  if(!d||!t) return;
  d.className='sdot'+(syncSt==='ing'?' ing':syncSt==='offline'?' off':'');
  t.textContent=syncSt==='synced'?'☁️ Cloud में Save है':syncSt==='syncing'?'💾 Save हो रहा है...':'📴 Offline Mode';
}

async function dbset(path,data){
  setSyncing();
  try{ await set(uref(path),data); setSynced(); }
  catch(e){ setOffline(); }
}

function startListeners(){
  listeners.forEach(({r,fn})=>off(r,fn));
  listeners=[];
  ['udhars','pocket','reminders'].forEach(key=>{
    const r=uref(key);
    const fn=onValue(r,snap=>{
      const v=snap.val();
      S[key]=v?Object.values(v).sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||'')):[];
      if(document.getElementById('app-wrap').style.display!=='none') render();
    },()=>setOffline());
    listeners.push({r,fn});
  });
}

// ── Auth — Anonymous (no popup!) ──────
onAuthStateChanged(auth, async user=>{
  document.getElementById('splash').style.display='none';
  if(user){
    FB_UID = user.uid;
    localStorage.setItem(uid_key, FB_UID);
    startListeners();
  } else {
    // Try to sign in anonymously — no UI needed!
    try{ await signInAnonymously(auth); }
    catch(e){ 
      // Fallback: use stored UID without auth
      FB_UID = localStorage.getItem(uid_key)||'local_'+Date.now();
      localStorage.setItem(uid_key, FB_UID);
      startListeners();
    }
  }
  showPin();
});

// ── PIN System ─────────────────────────
function showPin(){
  const saved=localStorage.getItem(pin_key);
  if(!saved){
    pinMode='setup1';
    document.getElementById('pin-msg').textContent='🔐 नया 4 अंक PIN बनाएं';
    document.getElementById('change-pin-btn').style.display='none';
  } else {
    pinMode='enter';
    document.getElementById('pin-msg').textContent='PIN डालें और अंदर आएं 👇';
    document.getElementById('change-pin-btn').style.display='';
  }
  pinBuf=''; updateDots();
  document.getElementById('pin-screen').style.display='flex';
}

function updateDots(){
  for(let i=0;i<4;i++){
    const d=document.getElementById('d'+i);
    d.classList.toggle('filled',i<pinBuf.length);
    d.classList.remove('err');
  }
}

function shakeErr(msg){
  for(let i=0;i<4;i++) document.getElementById('d'+i).classList.add('err');
  document.getElementById('pin-err').textContent=msg;
  setTimeout(()=>{ pinBuf=''; updateDots(); document.getElementById('pin-err').textContent=''; },900);
}

function processPin(){
  if(pinMode==='setup1'){
    pinTemp=pinBuf; pinBuf=''; updateDots();
    pinMode='setup2';
    document.getElementById('pin-msg').textContent='✅ PIN फिर से डालें (confirm)';
    document.getElementById('pin-err').textContent='';
  } else if(pinMode==='setup2'){
    if(pinBuf===pinTemp){
      localStorage.setItem(pin_key, btoa(pinBuf));
      unlockApp();
    } else {
      shakeErr('❌ PIN मेल नहीं खाया, फिर कोशिश करें');
      pinMode='setup1'; pinTemp='';
      setTimeout(()=>{ document.getElementById('pin-msg').textContent='🔐 नया 4 अंक PIN बनाएं'; },900);
    }
  } else {
    try{
      const saved=atob(localStorage.getItem(pin_key)||'');
      if(pinBuf===saved) unlockApp(); else shakeErr('❌ गलत PIN! फिर कोशिश करें');
    }catch(e){ shakeErr('❌ गलत PIN'); }
  }
}

function unlockApp(){
  document.getElementById('pin-screen').style.display='none';
  document.getElementById('app-wrap').style.display='block';
  render();
}

function lockApp(){
  pinBuf=''; updateDots();
  document.getElementById('pin-err').textContent='';
  const saved=localStorage.getItem(pin_key);
  if(saved){ pinMode='enter'; document.getElementById('pin-msg').textContent='PIN डालें और अंदर आएं 👇'; document.getElementById('change-pin-btn').style.display=''; }
  document.getElementById('app-wrap').style.display='none';
  document.getElementById('pin-screen').style.display='flex';
}

// PIN events
document.querySelectorAll('.key').forEach(b=>b.addEventListener('click',()=>{
  if(!b.dataset.k) return;
  if(pinBuf.length<4){ pinBuf+=b.dataset.k; updateDots(); if(pinBuf.length===4) setTimeout(processPin,150); }
}));
document.getElementById('del-btn').addEventListener('click',()=>{ if(pinBuf.length>0){pinBuf=pinBuf.slice(0,-1);updateDots();} });
document.getElementById('change-pin-btn').addEventListener('click',()=>{
  if(confirm('PIN बदलना चाहते हैं?')){ localStorage.removeItem(pin_key); pinMode='setup1'; pinBuf=''; updateDots(); document.getElementById('pin-msg').textContent='🔐 नया PIN बनाएं'; document.getElementById('change-pin-btn').style.display='none'; }
});
document.getElementById('reset-btn').addEventListener('click',()=>{
  if(confirm('⚠️ सारा DATA मिट जाएगा!\n\nक्या आप sure हैं?')){
    if(confirm('Last chance!\nहाँ, सब मिटाओ।')){ localStorage.clear(); location.reload(); }
  }
});

// ── CRUD ──────────────────────────────
async function saveUdhar(e){
  e.createdAt=e.date||today();
  await dbset(`udhars/${e.id}`,e);
  if(e.dueDate){
    const r={id:uid(),udhaarId:e.id,name:e.name,amount:e.amount,dueDate:e.dueDate,done:false,createdAt:today()};
    await dbset(`reminders/${r.id}`,r);
  }
}
async function settleUdhar(id){
  const u=S.udhars.find(x=>x.id===id); if(!u) return;
  await dbset(`udhars/${id}`,{...u,settled:true,settledDate:today()});
  for(const r of S.reminders.filter(x=>x.udhaarId===id)) await dbset(`reminders/${r.id}`,{...r,done:true});
}
async function savePocket(e){ e.createdAt=e.date; await dbset(`pocket/${e.id}`,e); }
async function saveRem(r){ r.createdAt=today(); await dbset(`reminders/${r.id}`,r); }
async function doneRem(id){ const r=S.reminders.find(x=>x.id===id); if(r) await dbset(`reminders/${id}`,{...r,done:true}); }

// ── Share ──────────────────────────────
function shareU(id){
  const u=S.udhars.find(x=>x.id==id); if(!u) return;
  const msg=`📒 *मेरा हिसाब — उधार रसीद*\n\n👤 नाम: ${u.name}\n💰 रकम: ${fmtAmt(u.amount)}\n📋 ${u.type==='lena'?'आपने मुझसे उधार लिया है':'मैंने आपसे उधार लिया है'}\n💳 ${u.mode==='cash'?'नकद (Cash)':'ऑनलाइन (UPI)'}\n${u.service&&u.service!=='general'?'📱 '+u.service+'\n':''}📅 ${fmtDate(u.createdAt)}\n${u.dueDate?'⏰ वापसी: '+fmtDate(u.dueDate)+'\n':''}\n${u.settled?'✅ चुकता हो गया':'⏳ अभी बकाया है'}${u.note?'\n📝 '+u.note:''}`;
  if(navigator.share) navigator.share({title:'उधार — '+u.name,text:msg}).catch(()=>copyTxt(msg));
  else copyTxt(msg);
}
function copyTxt(t){ try{navigator.clipboard.writeText(t).then(()=>toast('📋 WhatsApp के लिए Copy हो गया!'));}catch(e){const a=document.createElement('textarea');a.value=t;a.style.cssText='position:fixed;opacity:0';document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);toast('📋 Copy हो गया!');} }

// ── Computed ───────────────────────────
function aU(){ return S.udhars.filter(u=>!u.settled); }
function lena(){ return aU().filter(u=>u.type==='lena').reduce((s,u)=>s+Number(u.amount),0); }
function dena(){ return aU().filter(u=>u.type==='dena').reduce((s,u)=>s+Number(u.amount),0); }
function aIn(){ return S.pocket.filter(t=>t.dir==='in').reduce((s,t)=>s+Number(t.amount),0); }
function aOut(){ return S.pocket.filter(t=>t.dir==='out').reduce((s,t)=>s+Number(t.amount),0); }
function bal(){ return aIn()-aOut(); }
function tIn(){ return S.pocket.filter(t=>t.date===today()&&t.dir==='in').reduce((s,t)=>s+Number(t.amount),0); }
function tOut(){ return S.pocket.filter(t=>t.date===today()&&t.dir==='out').reduce((s,t)=>s+Number(t.amount),0); }
function ovU(){ return aU().filter(u=>u.dueDate&&u.dueDate<today()); }

// ── Render ─────────────────────────────
function render(){ document.getElementById('app').innerHTML=page()+nav()+modal(); attach(); refreshSyncDot(); }

function urow(u){
  const ov=u.dueDate&&u.dueDate<today()&&!u.settled;
  const mc=u.mode==='cash'?'#16A34A':'#0EA5E9';
  const btns=!u.settled
    ?`<div class="arow"><button class="sbtn" data-id="${u.id}">✅ चुकता करें</button><button class="shbtn" data-id="${u.id}">📤 Share</button></div>`
    :`<div class="arow"><span style="font-size:11px;color:#16A34A;font-weight:700">✅ चुकता</span><button class="shbtn" data-id="${u.id}">📤 Share</button></div>`;
  return `<div class="row"><div style="flex:1">
    <div style="display:flex;align-items:center;gap:8px"><span style="font-weight:700;font-size:15px">${u.name}</span>${ov?'<span class="ob">⚠️ बकाया</span>':''}</div>
    <div class="rmeta">${bdg(mc,u.mode==='cash'?'💵 Cash':'📱 Online')}${u.service&&u.service!=='general'?bdg('#D97706',u.service):''}<span style="font-size:12px;color:#78716C">${fmtDate(u.createdAt)}</span></div>
    ${u.note?`<p style="font-size:12px;color:#78716C;margin-top:2px">${u.note}</p>`:''}${btns}
  </div><div style="text-align:right;margin-left:10px"><p style="font-weight:800;font-size:17px;color:${u.type==='lena'?'#16A34A':'#DC2626'}">${u.type==='lena'?'+':'-'}${fmtAmt(u.amount)}</p></div></div>`;
}

function page(){ switch(S.tab){ case 'udhar':return pgUdhar(); case 'pocket':return pgPocket(); case 'history':return pgHistory(); case 'reminders':return pgRem(); default:return pgDash(); } }

function pgDash(){
  const ov=ovU();
  const ovH=ov.length>0?`<div class="alr"><p style="font-weight:700;color:#DC2626;margin-bottom:8px">⚠️ ${ov.length} उधार की तारीख निकल गई!</p>${ov.slice(0,3).map(u=>`<div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px"><span>${u.name}</span><span style="font-weight:700;color:#DC2626">${fmtAmt(u.amount)}</span></div>`).join('')}</div>`:'';
  const recU=aU().slice(0,4);
  const recH=recU.length>0
    ?`<div class="card"><p style="font-weight:700;margin-bottom:10px">📒 हालिया उधार</p>${recU.map(u=>urow(u)).join('')}${aU().length>4?`<p class="sau" style="text-align:center;color:#FF6B00;font-weight:700;cursor:pointer;margin-top:8px">सब देखें →</p>`:''}</div>`
    :`<div class="card" style="text-align:center;color:#78716C"><p style="font-size:32px">📒</p><p style="margin:4px 0">अभी कोई उधार नहीं</p><button class="btn bp dau" style="margin-top:8px">+ पहला उधार जोड़ें</button></div>`;
  return `<div class="page"><div class="hdr">
    <div class="hdr-top"><div><p style="color:#FFE4C4;font-size:13px;font-weight:600">नमस्ते Alok जी 🙏</p><h1 style="color:#fff;font-size:26px;font-family:Georgia,serif;margin:4px 0 0">मेरा हिसाब</h1></div>
    <button class="hdr-btn" id="lock-btn">🔒</button></div>
    <div class="sync-bar"><span class="sdot" id="sdot"></span><span id="stxt">☁️ Cloud में Save है</span></div>
  </div>
  <div class="px">
    <div class="card card-g" style="margin-bottom:14px"><p style="font-size:13px;opacity:.85;margin-bottom:4px">💰 जेब में बचे</p><p style="font-size:36px;font-weight:800;font-family:Georgia,serif">${fmtAmt(bal())}</p>
    <div style="display:flex;gap:20px;margin-top:10px"><div><p style="font-size:12px;opacity:.8">आज आया</p><p style="font-weight:700">${fmtAmt(tIn())}</p></div><div><p style="font-size:12px;opacity:.8">आज गया</p><p style="font-weight:700">${fmtAmt(tOut())}</p></div></div></div>
    <div class="g2">
      <div class="sb sg"><p class="sl">📥 मुझे मिलना है</p><p class="sv" style="color:#16A34A">${fmtAmt(lena())}</p><p style="font-size:12px;color:#78716C;margin-top:4px">${aU().filter(u=>u.type==='lena').length} लोग</p></div>
      <div class="sb sr"><p class="sl">📤 मुझे देना है</p><p class="sv" style="color:#DC2626">${fmtAmt(dena())}</p><p style="font-size:12px;color:#78716C;margin-top:4px">${aU().filter(u=>u.type==='dena').length} जगह</p></div>
    </div>
    ${ovH}
    <div class="card" style="margin-bottom:14px"><p style="font-weight:700;margin-bottom:10px">⚡ जल्दी करें</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button class="qab" data-a="udhar" style="padding:12px 8px;border-radius:12px;border:2px solid #FF6B0020;background:#FF6B0010;color:#FF6B00;font-weight:700;font-size:13px;cursor:pointer">📒 उधार जोड़ें</button>
      <button class="qab" data-a="pocket" style="padding:12px 8px;border-radius:12px;border:2px solid #DC262620;background:#DC262610;color:#DC2626;font-weight:700;font-size:13px;cursor:pointer">💸 खर्च जोड़ें</button>
      <button class="qab" data-a="income" style="padding:12px 8px;border-radius:12px;border:2px solid #16A34A20;background:#16A34A10;color:#16A34A;font-weight:700;font-size:13px;cursor:pointer">💰 आमदनी जोड़ें</button>
      <button class="qab" data-a="reminders" style="padding:12px 8px;border-radius:12px;border:2px solid #D9770620;background:#D9770610;color:#D97706;font-weight:700;font-size:13px;cursor:pointer">🔔 रिमाइंडर</button>
    </div></div>
    ${recH}
  </div></div>`;
}

function pgUdhar(){
  let fi=S.udhars.filter(u=>S.udharFilter==='active'?!u.settled:S.udharFilter==='settled'?u.settled:true).filter(u=>u.name.toLowerCase().includes(S.udharSearch.toLowerCase()));
  const lT=fi.filter(u=>u.type==='lena'&&!u.settled).reduce((s,u)=>s+Number(u.amount),0);
  const dT=fi.filter(u=>u.type==='dena'&&!u.settled).reduce((s,u)=>s+Number(u.amount),0);
  return `<div class="page px" style="padding-top:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h2 style="font-family:Georgia,serif">📒 उधार खाता</h2><button class="btn bp" style="padding:8px 14px;font-size:14px" id="aub">+ जोड़ें</button></div>
    ${S.udharFilter==='active'?`<div class="g2"><div class="sb sg"><p class="sl">मिलना है</p><p class="sv" style="color:#16A34A">${fmtAmt(lT)}</p></div><div class="sb sr"><p class="sl">देना है</p><p class="sv" style="color:#DC2626">${fmtAmt(dT)}</p></div></div>`:''}
    <input class="si" id="us" placeholder="🔍 नाम खोजें..." value="${S.udharSearch}"/>
    <div class="ftabs">${['active|चालू','settled|चुकता','all|सब'].map(s=>{const[v,l]=s.split('|');return`<button class="ftab uf ${S.udharFilter===v?'on':''}" data-val="${v}">${l}</button>`;}).join('')}</div>
    ${fi.length===0?`<div class="empty"><p style="font-size:40px">📒</p><p>कोई उधार नहीं</p></div>`:fi.map(u=>urow(u)).join('')}
  </div>`;
}

function pgPocket(){
  const dT=S.pocket.filter(t=>t.date===S.pocketDate);
  const dI=dT.filter(t=>t.dir==='in').reduce((s,t)=>s+Number(t.amount),0);
  const dO=dT.filter(t=>t.dir==='out').reduce((s,t)=>s+Number(t.amount),0);
  return `<div class="page px" style="padding-top:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h2 style="font-family:Georgia,serif">👛 जेब खर्च</h2><div style="display:flex;gap:6px"><button class="btn bg" style="padding:8px 10px;font-size:13px" id="aib">+ आमदनी</button><button class="btn br" style="padding:8px 10px;font-size:13px" id="apb">+ खर्च</button></div></div>
    <div class="card card-g" style="margin-bottom:14px"><p style="font-size:13px;opacity:.85;margin-bottom:4px">कुल बचत</p><p style="font-size:36px;font-weight:800;font-family:Georgia,serif">${fmtAmt(bal())}</p></div>
    <input type="date" class="fi" id="pd" value="${S.pocketDate}" style="margin-bottom:10px"/>
    <div class="g2"><div class="sb sg"><p class="sl">इस दिन आया</p><p class="sv" style="color:#16A34A;font-size:18px">${fmtAmt(dI)}</p></div><div class="sb sr"><p class="sl">इस दिन गया</p><p class="sv" style="color:#DC2626;font-size:18px">${fmtAmt(dO)}</p></div></div>
    ${dT.length===0?`<div class="empty"><p style="font-size:40px">👛</p><p>इस दिन कोई लेनदेन नहीं</p></div>`:dT.map(t=>`<div class="row"><div><p style="font-weight:700">${t.category}</p><div class="rmeta">${bdg(t.mode==='cash'?'#16A34A':'#0EA5E9',t.mode==='cash'?'💵 Cash':'📱 Online')}${t.note?`<span style="font-size:12px;color:#78716C">${t.note}</span>`:''}</div></div><p style="font-weight:800;font-size:17px;color:${t.dir==='in'?'#16A34A':'#DC2626'}">${t.dir==='in'?'+':'-'}${fmtAmt(t.amount)}</p></div>`).join('')}
  </div>`;
}

function pgHistory(){
  const all=[...S.udhars.map(u=>({...u,_t:'udhar'})),...S.pocket.map(p=>({...p,_t:'pocket'}))].sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  const fi=S.historyType==='all'?all:S.historyType==='udhar'?all.filter(t=>t._t==='udhar'):all.filter(t=>t._t==='pocket');
  return `<div class="page px" style="padding-top:16px">
    <h2 style="font-family:Georgia,serif;margin-bottom:14px">📜 पूरा इतिहास</h2>
    <div class="ftabs">${['all|सब','udhar|उधार','pocket|खर्च/आमदनी'].map(s=>{const[v,l]=s.split('|');return`<button class="ftab hf ${S.historyType===v?'on':''}" data-val="${v}">${l}</button>`;}).join('')}</div>
    ${fi.length===0?`<div class="empty"><p style="font-size:40px">📜</p><p>कोई रिकॉर्ड नहीं</p></div>`:fi.map(t=>{const ig=t._t==='udhar'?t.type==='lena':t.dir==='in';return`<div class="row"><div><div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap"><span style="font-weight:700">${t._t==='udhar'?t.name:t.category}</span>${bdg(t._t==='udhar'?'#FF6B00':'#D97706',t._t==='udhar'?'उधार':'खर्च')}${t.settled?bdg('#16A34A','✅ चुकता'):''}</div><div class="rmeta">${bdg(t.mode==='cash'?'#16A34A':'#0EA5E9',t.mode==='cash'?'💵 Cash':'📱 Online')}<span style="font-size:12px;color:#78716C">${fmtDate(t.createdAt||t.date)}</span></div></div><p style="font-weight:800;font-size:17px;color:${ig?'#16A34A':'#DC2626'}">${fmtAmt(t.amount)}</p></div>`;}).join('')}
  </div>`;
}

function pgRem(){
  const ac=S.reminders.filter(r=>!r.done).sort((a,b)=>a.dueDate>b.dueDate?1:-1);
  const dn=S.reminders.filter(r=>r.done);
  return `<div class="page px" style="padding-top:16px">
    <h2 style="font-family:Georgia,serif;margin-bottom:14px">🔔 रिमाइंडर</h2>
    <div class="card" style="margin-bottom:14px"><p style="font-weight:700;margin-bottom:10px">➕ नया रिमाइंडर</p>
      <label class="fl">📝 किसलिए?</label><input class="fi" id="rn" placeholder="जैसे: बिजली बिल, उधार याद"/>
      <label class="fl">💰 रकम (वैकल्पिक)</label><input class="fi" id="ra" type="number" placeholder="0"/>
      <label class="fl">📅 तारीख</label><input class="fi" id="rd" type="date"/>
      <label class="fl">📝 नोट</label><input class="fi" id="rno" placeholder="कुछ जरूरी बात..."/>
      <button class="btn bp bfw" id="arb">🔔 जोड़ें</button>
    </div>
    <p style="font-weight:700;margin-bottom:8px">📌 आने वाले (${ac.length})</p>
    ${ac.length===0?'<p style="color:#78716C;margin-bottom:14px">कोई रिमाइंडर नहीं</p>':ac.map(r=>{const ov=r.dueDate<today();const dL=Math.ceil((new Date(r.dueDate)-new Date())/86400000);const msg=ov?`⚠️ ${Math.abs(dL)} दिन पहले था!`:dL===0?'🔴 आज!':`📅 ${dL} दिन बाद`;return`<div class="card" style="border:${ov?'1.5px solid #FECACA':'1px solid #FFE4C4'};background:${ov?'#FEF2F2':'#fff'}"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><p style="font-weight:700">${r.name}</p>${r.amount?`<p style="color:#16A34A;font-weight:700;margin:2px 0">${fmtAmt(r.amount)}</p>`:''}<p style="font-size:13px;color:${ov?'#DC2626':'#78716C'};margin:2px 0">${msg}</p>${r.note?`<p style="font-size:12px;color:#78716C;margin-top:4px">${r.note}</p>`:''}</div><button class="rdb" data-id="${r.id}" style="background:#16A34A15;color:#16A34A;border:none;border-radius:10px;padding:6px 12px;cursor:pointer;font-weight:700;font-size:13px">✅ हो गया</button></div></div>`;}).join('')}
    ${dn.length>0?`<p style="font-weight:700;color:#78716C;margin-top:14px;margin-bottom:8px">✅ पूरे हुए (${dn.length})</p>${dn.slice(0,5).map(r=>`<div class="row" style="opacity:.6"><span>${r.name}</span>${r.amount?`<span style="font-weight:700">${fmtAmt(r.amount)}</span>`:''}</div>`).join('')}`:''}
  </div>`;
}

function modal(){
  if(!S.modal) return ''; let title='',body=''; const f=mf;
  if(S.modal==='udhar'){ title='📒 नया उधार जोड़ें'; body=`
    <label class="fl">👤 व्यक्ति का नाम</label><input class="fi" id="mn" placeholder="जैसे: राम भाऊ, सुरेश जी" value="${f.name||''}"/>
    <label class="fl">💰 रकम (₹)</label><input class="fi" id="ma" type="number" placeholder="0" value="${f.amount||''}"/>
    <label class="fl">📋 प्रकार</label><select class="fi" id="mt"><option value="lena" ${(f.type||'lena')==='lena'?'selected':''}>मुझे लेना है (उन्होंने उधार लिया)</option><option value="dena" ${f.type==='dena'?'selected':''}>मुझे देना है (मैंने उधार लिया)</option></select>
    <label class="fl">💳 माध्यम</label><select class="fi" id="mm"><option value="cash">नकद (Cash)</option><option value="online">ऑनलाइन (UPI)</option></select>
    <label class="fl">📱 सेवा</label><select class="fi" id="ms"><option value="general">सामान्य</option><option value="jio">Jio</option><option value="airtel">Airtel</option><option value="vi">Vi</option><option value="bsnl">BSNL</option><option value="other">अन्य</option></select>
    <label class="fl">📅 तारीख</label><input class="fi" id="md" type="date" value="${f.date||today()}"/>
    <label class="fl">⏰ वापसी की तारीख (वैकल्पिक)</label><input class="fi" id="mdu" type="date" value="${f.dueDate||''}"/>
    <label class="fl">📝 नोट</label><input class="fi" id="mno" placeholder="कुछ जरूरी बात..." value="${f.note||''}"/>
    <button class="btn bp bfw" id="su">✅ सेव करें</button>`; }
  if(S.modal==='pocket'||S.modal==='income'){ const isI=S.modal==='income'; title=isI?'💰 आमदनी जोड़ें':'💸 खर्च जोड़ें'; const dir=f.dir||(isI?'in':'out'); const cats=dir==='in'?['दुकान कमाई','उधार वापसी','मजदूरी','अन्य आमदनी']:['खाना','यातायात','दुकान खर्च','मोबाइल','बिल','कपड़े','दवाई','मनोरंजन','अन्य']; body=`
    <div style="display:flex;gap:8px;margin-bottom:12px"><button class="dib" data-dir="in" style="flex:1;padding:10px 0;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;border:2px solid #16A34A;background:${dir==='in'?'#16A34A':'transparent'};color:${dir==='in'?'#fff':'#16A34A'}">💰 आमदनी</button><button class="dib" data-dir="out" style="flex:1;padding:10px 0;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;border:2px solid #DC2626;background:${dir==='out'?'#DC2626':'transparent'};color:${dir==='out'?'#fff':'#DC2626'}">💸 खर्च</button></div>
    <label class="fl">💰 रकम (₹)</label><input class="fi" id="pa" type="number" placeholder="0" value="${f.amount||''}"/>
    <label class="fl">📂 श्रेणी</label><select class="fi" id="pc">${cats.map(c=>`<option>${c}</option>`).join('')}</select>
    <label class="fl">💳 माध्यम</label><select class="fi" id="pm"><option value="cash">नकद (Cash)</option><option value="online">ऑनलाइन (UPI)</option></select>
    <label class="fl">📅 तारीख</label><input class="fi" id="pda" type="date" value="${f.date||today()}"/>
    <label class="fl">📝 नोट</label><input class="fi" id="pno" placeholder="किसलिए?" value="${f.note||''}"/>
    <button class="btn bp bfw" id="sp">✅ सेव करें</button><input type="hidden" id="pdir" value="${dir}"/>`; }
  if(S.modal==='settle'&&S.settleItem){ const u=S.settleItem; const mode=f.sm||'full'; title='✅ चुकता करें'; body=`
    <div style="background:#FFF8F0;border-radius:12px;padding:14px;margin-bottom:14px"><p style="font-weight:700;font-size:16px">${u.name}</p><p style="color:#78716C;margin-top:4px">${fmtAmt(u.amount)} • ${u.type==='lena'?'आपको मिलना था':'आपको देना था'}</p></div>
    <div style="display:flex;gap:8px;margin-bottom:12px"><button class="smb" data-mode="full" style="flex:1;padding:10px 0;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;border:2px solid #FF6B00;background:${mode==='full'?'#FF6B00':'transparent'};color:${mode==='full'?'#fff':'#FF6B00'}">पूरा चुकता</button><button class="smb" data-mode="partial" style="flex:1;padding:10px 0;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;border:2px solid #FF6B00;background:${mode==='partial'?'#FF6B00':'transparent'};color:${mode==='partial'?'#fff':'#FF6B00'}">आंशिक</button></div>
    ${mode==='partial'?`<label class="fl">कितना मिला/दिया? (₹)</label><input class="fi" id="sa" type="number" placeholder="0"/>`:''}
    <button class="btn bg bfw" id="cs">✅ चुकता करें</button>`; }
  return `<div class="mov" id="mov"><div class="mbox"><div class="mhdr"><h3 style="font-family:Georgia,serif;font-size:20px">${title}</h3><button class="mcls" id="cm">✕</button></div>${body}</div></div>`;
}

function nav(){ return `<div class="bnav">${[['dashboard','🏠','होम'],['udhar','📒','उधार'],['pocket','👛','जेब'],['history','📜','इतिहास'],['reminders','🔔','रिमाइंडर']].map(([t,ic,lb])=>`<button class="nb ${S.tab===t?'on':''}" data-tab="${t}"><span class="ni">${ic}</span>${lb}</button>`).join('')}</div>`; }

function attach(){
  document.querySelectorAll('.nb').forEach(b=>b.onclick=()=>{ S.tab=b.dataset.tab;mf={};render(); });
  const lb=document.getElementById('lock-btn'); if(lb) lb.onclick=()=>lockApp();
  const mov=document.getElementById('mov'); if(mov) mov.onclick=e=>{ if(e.target===mov){S.modal=null;mf={};render();} };
  const cm=document.getElementById('cm'); if(cm) cm.onclick=()=>{ S.modal=null;mf={};render(); };
  document.querySelectorAll('.qab').forEach(b=>b.onclick=()=>{ const a=b.dataset.a; if(a==='reminders'){S.tab='reminders';render();}else{S.modal=a;mf={dir:a==='income'?'in':'out'};render();} });
  document.querySelectorAll('.dau').forEach(b=>b.onclick=()=>{ S.modal='udhar';mf={};render(); });
  const sau=document.querySelector('.sau'); if(sau) sau.onclick=()=>{ S.tab='udhar';render(); };
  const aub=document.getElementById('aub'); if(aub) aub.onclick=()=>{ S.modal='udhar';mf={};render(); };
  const us=document.getElementById('us'); if(us) us.oninput=e=>{ S.udharSearch=e.target.value;render(); };
  document.querySelectorAll('.uf').forEach(b=>b.onclick=()=>{ S.udharFilter=b.dataset.val;render(); });
  document.querySelectorAll('.sbtn').forEach(b=>b.onclick=()=>{ const u=S.udhars.find(x=>x.id==b.dataset.id); if(u){S.settleItem=u;S.modal='settle';mf={};render();} });
  document.querySelectorAll('.shbtn').forEach(b=>b.onclick=()=>shareU(b.dataset.id));
  const apb=document.getElementById('apb'); if(apb) apb.onclick=()=>{ S.modal='pocket';mf={dir:'out'};render(); };
  const aib=document.getElementById('aib'); if(aib) aib.onclick=()=>{ S.modal='income';mf={dir:'in'};render(); };
  const pdd=document.getElementById('pd'); if(pdd) pdd.onchange=e=>{ S.pocketDate=e.target.value;render(); };
  document.querySelectorAll('.hf').forEach(b=>b.onclick=()=>{ S.historyType=b.dataset.val;render(); });
  const arb=document.getElementById('arb'); if(arb) arb.onclick=async()=>{ const n=document.getElementById('rn').value.trim(); const d=document.getElementById('rd').value; if(!n||!d){alert('नाम और तारीख भरें!');return;} await saveRem({id:uid(),name:n,amount:Number(document.getElementById('ra').value)||0,dueDate:d,note:document.getElementById('rno').value,done:false}); };
  document.querySelectorAll('.rdb').forEach(b=>b.onclick=async()=>{ await doneRem(b.dataset.id); });
  document.querySelectorAll('.dib').forEach(b=>b.onclick=()=>{ mf.dir=b.dataset.dir;mf.category='';render(); });
  document.querySelectorAll('.smb').forEach(b=>b.onclick=()=>{ mf.sm=b.dataset.mode;render(); });
  const su=document.getElementById('su'); if(su) su.onclick=async()=>{ const n=document.getElementById('mn').value.trim(); const a=Number(document.getElementById('ma').value); if(!n||!a){alert('नाम और रकम भरें!');return;} await saveUdhar({id:uid(),name:n,amount:a,type:document.getElementById('mt').value,mode:document.getElementById('mm').value,service:document.getElementById('ms').value,date:document.getElementById('md').value,dueDate:document.getElementById('mdu').value,note:document.getElementById('mno').value,settled:false}); S.modal=null;mf={}; };
  const sp=document.getElementById('sp'); if(sp) sp.onclick=async()=>{ const a=Number(document.getElementById('pa').value); if(!a){alert('रकम भरें!');return;} const dir=document.getElementById('pdir').value; await savePocket({id:uid(),amount:a,dir,category:document.getElementById('pc').value,mode:document.getElementById('pm').value,date:document.getElementById('pda').value,note:document.getElementById('pno').value}); S.modal=null;mf={}; };
  const cs=document.getElementById('cs'); if(cs) cs.onclick=async()=>{ const mode=mf.sm||'full'; if(mode==='partial'&&!Number(document.getElementById('sa')?.value)){alert('रकम भरें!');return;} await settleUdhar(S.settleItem.id); S.modal=null;S.settleItem=null;mf={}; };
}
</script>
</body>
</html>
