<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#FF6B00"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="मेरा हिसाब"/>
<title>मेरा हिसाब 🔒</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{background:#FFF8F0;font-family:'Noto Sans Devanagari','Segoe UI',sans-serif;color:#1C1917;overscroll-behavior:none}
button,input,select{font-family:'Noto Sans Devanagari','Segoe UI',sans-serif}
#splash{position:fixed;inset:0;background:linear-gradient(160deg,#FF6B00,#CC4400);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.splash-logo{font-size:64px;animation:pop .4s ease}
@keyframes pop{0%{transform:scale(.6)}100%{transform:scale(1)}}
.splash-title{color:#fff;font-size:30px;font-family:Georgia,serif}
.splash-sub{color:#FFE4C4;font-size:14px}
.spin{width:32px;height:32px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin-top:20px}
@keyframes spin{to{transform:rotate(360deg)}}
#login-screen{position:fixed;inset:0;background:linear-gradient(160deg,#FF6B00,#CC4400);z-index:998;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
.login-logo{font-size:56px;margin-bottom:8px}
.login-title{color:#fff;font-size:28px;font-family:Georgia,serif;margin-bottom:6px}
.login-sub{color:#FFE4C4;font-size:14px;margin-bottom:40px;text-align:center;line-height:1.6}
.google-btn{display:flex;align-items:center;gap:12px;background:#fff;border:none;border-radius:16px;padding:14px 28px;font-size:16px;font-weight:700;color:#1C1917;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.google-btn:active{transform:scale(.97)}
#pin-screen{position:fixed;inset:0;background:linear-gradient(160deg,#FF6B00,#CC4400);z-index:997;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
.pin-user-info{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.pin-avatar{width:44px;height:44px;border-radius:50%;border:2px solid rgba(255,255,255,.5)}
.pin-user-name{color:#fff;font-size:15px;font-weight:700}
.pin-sub-t{color:#FFE4C4;font-size:13px}
.pin-dots{display:flex;gap:16px;margin-bottom:32px}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid #FFE4C4;background:transparent;transition:.2s}
.pin-dot.filled{background:#fff;border-color:#fff}
.pin-dot.error{background:#FF6B6B;border-color:#FF6B6B;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px}
.pin-key{background:rgba(255,255,255,.15);border:none;border-radius:16px;padding:18px 0;font-size:24px;font-weight:700;color:#fff;cursor:pointer;transition:.1s}
.pin-key:active{background:rgba(255,255,255,.35);transform:scale(.94)}
.pin-key.zero{grid-column:2}
.pin-key.del{background:rgba(255,100,100,.2);color:#FFD0D0}
.pin-err{color:#FFD0D0;font-size:13px;margin-top:10px;height:18px;text-align:center}
.pin-actions{display:flex;gap:20px;margin-top:16px}
.pin-link{color:#FFE4C4;font-size:13px;text-decoration:underline;cursor:pointer;background:none;border:none}
#main-app{display:none}
.app{max-width:480px;margin:0 auto;min-height:100vh}
.page{padding-bottom:80px;min-height:100vh}
.header{background:linear-gradient(135deg,#FF6B00,#CC5500);padding:28px 20px 20px;border-radius:0 0 28px 28px;margin-bottom:20px;position:relative}
.header-top{display:flex;justify-content:space-between;align-items:flex-start}
.header-btns{display:flex;gap:8px}
.hdr-btn{background:rgba(255,255,255,.2);border:none;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center}
.sync-bar{font-size:11px;color:#FFE4C4;margin-top:6px;display:flex;align-items:center;gap:5px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#4ADE80}
.sync-dot.syncing{background:#FCD34D;animation:pulse .8s infinite}
.sync-dot.offline{background:#F87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px #FF6B0015;border:1px solid #FFE4C4;margin-bottom:16px}
.card-green{background:linear-gradient(135deg,#16A34A,#15803D);color:#fff}
.px16{padding:0 16px}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1.5px solid #FFE4C4;display:flex;z-index:50}
.nav-btn{flex:1;padding:10px 0;background:transparent;border:none;cursor:pointer;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:2px;color:#78716C}
.nav-btn.active{color:#FF6B00;font-weight:700}
.nav-icon{font-size:20px}
.modal-overlay{position:fixed;inset:0;background:#00000060;z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:24px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-close{background:#F5F5F5;border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:18px}
.fl{font-size:13px;color:#78716C;font-weight:600;display:block;margin-bottom:4px;margin-top:14px}
.fi{width:100%;border:1.5px solid #FFE4C4;border-radius:10px;padding:10px 12px;font-size:15px;color:#1C1917;background:#FFF8F0;outline:none}
.fi:focus{border-color:#FF6B00}
.btn{border-radius:12px;padding:10px 20px;font-weight:700;font-size:15px;cursor:pointer}
.btn-p{background:#FF6B00;color:#fff;border:2px solid #FF6B00}
.btn-g{background:#16A34A;color:#fff;border:2px solid #16A34A}
.btn-r{background:#DC2626;color:#fff;border:2px solid #DC2626}
.btn-full{width:100%;margin-top:8px}
.badge{padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.ftabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.ftab{padding:7px 16px;border-radius:20px;font-weight:700;font-size:13px;cursor:pointer;border:2px solid #FF6B00;background:transparent;color:#FF6B00}
.ftab.active{background:#FF6B00;color:#fff}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #FFE4C4}
.row-meta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;align-items:center}
.a-row{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.s-btn{font-size:11px;background:#FF6B0020;color:#FF6B00;border:none;border-radius:8px;padding:3px 8px;cursor:pointer;font-weight:700}
.sh-btn{font-size:11px;background:#0EA5E920;color:#0EA5E9;border:none;border-radius:8px;padding:3px 8px;cursor:pointer;font-weight:700}
.alert-r{background:#FEF2F2;border:1.5px solid #FECACA;border-radius:14px;padding:14px;margin-bottom:16px}
.si{width:100%;border:1.5px solid #FFE4C4;border-radius:10px;padding:10px 12px;font-size:14px;background:#FFF8F0;outline:none;margin-bottom:12px}
.empty{text-align:center;padding:40px;color:#78716C}
.sb{border-radius:12px;padding:12px}
.sg{background:#F0FDF4;border:1.5px solid #BBF7D0}
.sr{background:#FEF2F2;border:1.5px solid #FECACA}
.sl{font-size:12px;color:#78716C}
.sv{font-weight:800;font-size:20px}
.ob{font-size:11px;background:#FEE2E2;color:#DC2626;padding:1px 6px;border-radius:8px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1C1917;color:#fff;padding:12px 20px;border-radius:20px;font-size:13px;z-index:300;max-width:90vw;text-align:center;pointer-events:none}
</style>
</head>
<body>

<div id="splash">
  <div class="splash-logo">📒</div>
  <h2 class="splash-title">मेरा हिसाब</h2>
  <p class="splash-sub">आपका पैसा, आपका हिसाब</p>
  <div class="spin"></div>
</div>

<div id="login-screen">
  <div class="login-logo">📒</div>
  <h2 class="login-title">मेरा हिसाब</h2>
  <p class="login-sub">Google से login करें<br>☁️ Data हमेशा safe रहेगा<br>कोई billing नहीं, बिल्कुल Free!</p>
  <button class="google-btn" id="google-login-btn">
    <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Google से Login करें
  </button>
</div>

<div id="pin-screen">
  <div class="pin-user-info">
    <img class="pin-avatar" id="pin-avatar" src="" alt="" style="display:none"/>
    <div>
      <p class="pin-user-name" id="pin-uname">Alok जी 🙏</p>
      <p class="pin-sub-t" id="pin-sub-text">PIN डालें</p>
    </div>
  </div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-keypad">
    <button class="pin-key" data-k="1">1</button>
    <button class="pin-key" data-k="2">2</button>
    <button class="pin-key" data-k="3">3</button>
    <button class="pin-key" data-k="4">4</button>
    <button class="pin-key" data-k="5">5</button>
    <button class="pin-key" data-k="6">6</button>
    <button class="pin-key" data-k="7">7</button>
    <button class="pin-key" data-k="8">8</button>
    <button class="pin-key" data-k="9">9</button>
    <button class="pin-key zero" data-k="0">0</button>
    <button class="pin-key del" id="pin-del">⌫</button>
  </div>
  <p class="pin-err" id="pin-err"></p>
  <div class="pin-actions">
    <button class="pin-link" id="pin-change-btn">PIN बदलें</button>
    <button class="pin-link" id="pin-logout-btn">Logout</button>
  </div>
</div>

<div id="main-app">
  <div class="app" id="app"></div>
</div>

<script type="module">
import { initializeApp }          from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
                                   from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, push, update, onValue, off, serverTimestamp }
                                   from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ══════════════════════════════════════════════
// 🔧 STEP 1: APNA CONFIG YAHAN DAALO
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "APNA_API_KEY",
  authDomain:        "APNA_PROJECT.firebaseapp.com",
  projectId:         "APNA_PROJECT_ID",
  storageBucket:     "APNA_PROJECT.appspot.com",
  messagingSenderId: "APNA_SENDER_ID",
  appId:             "APNA_APP_ID",
  databaseURL:       "https://mera-hisaab-778fa-default-rtdb.firebaseio.com/"
};
// ══════════════════════════════════════════════

const fbApp  = initializeApp(firebaseConfig);
const auth   = getAuth(fbApp);
const db     = getDatabase(fbApp);

// ── State ──────────────────────────────────────
let currentUser = null;
let pinBuf = '', pinMode = 'enter', pinTemp = '';
let syncStatus = 'synced';
let dbListeners = [];

let S = {
  tab:'dashboard', udhars:[], pocket:[], reminders:[],
  modal:null, settleItem:null,
  udharFilter:'active', udharSearch:'',
  historyType:'all', pocketDate: today()
};
let mf = {};

function today(){ return new Date().toISOString().split('T')[0]; }
function uid(){ return Date.now()+'_'+Math.random().toString(36).slice(2,7); }
function fmtDate(d){ try{ return new Date(d).toLocaleDateString('hi-IN',{day:'2-digit',month:'short',year:'numeric'}); }catch(e){return d||'';} }
function fmtAmt(n){ return '₹'+Math.abs(Number(n)||0).toLocaleString('en-IN'); }
function bdg(c,t){ return `<span class="badge" style="background:${c}20;color:${c}">${t}</span>`; }

// ── DB Helpers ─────────────────────────────────
function userRef(path){ return ref(db, `users/${currentUser.uid}/${path}`); }

function setSyncing(){ syncStatus='syncing'; refreshSyncUI(); }
function setSynced(){  syncStatus='synced';  refreshSyncUI(); }
function setOffline(){ syncStatus='offline'; refreshSyncUI(); }

function refreshSyncUI(){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-txt');
  if(!dot||!txt) return;
  dot.className='sync-dot'+(syncStatus==='syncing'?' syncing':syncStatus==='offline'?' offline':'');
  txt.textContent=syncStatus==='synced'?'☁️ Cloud में Save':syncStatus==='syncing'?'Save हो रहा है...':'📴 Offline';
}

async function dbSet(path, data){
  setSyncing();
  try{ await set(userRef(path), data); setSynced(); }
  catch(e){ setOffline(); console.error(e); }
}

// Start realtime listeners
function startListeners(){
  dbListeners.forEach(({r,fn})=>off(r,fn));
  dbListeners=[];

  ['udhars','pocket','reminders'].forEach(key=>{
    const r = userRef(key);
    const fn = onValue(r, snap=>{
      const val = snap.val();
      S[key] = val ? Object.values(val).sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||'')) : [];
      if(document.getElementById('main-app').style.display!=='none') render();
    }, ()=>setOffline());
    dbListeners.push({r,fn});
  });
}

// ── Auth ───────────────────────────────────────
onAuthStateChanged(auth, user=>{
  document.getElementById('splash').style.display='none';
  if(user){ currentUser=user; startListeners(); showPin(user); }
  else showLogin();
});

document.getElementById('google-login-btn').onclick=async()=>{
  try{ await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch(e){ toast('Login नहीं हुआ, फिर कोशिश करें'); }
};

// ── PIN ────────────────────────────────────────
function getPinKey(){ return 'mh_pin_'+currentUser.uid; }

function showPin(user){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-app').style.display='none';
  const saved=localStorage.getItem(getPinKey());
  if(!saved){
    pinMode='setup1';
    document.getElementById('pin-sub-text').textContent='🔐 नया 4 अंक PIN बनाएं';
    document.getElementById('pin-change-btn').style.display='none';
  } else {
    pinMode='enter';
    document.getElementById('pin-sub-text').textContent='PIN डालें और अंदर आएं';
    document.getElementById('pin-change-btn').style.display='';
  }
  const av=document.getElementById('pin-avatar');
  if(user.photoURL){ av.src=user.photoURL; av.style.display=''; }
  document.getElementById('pin-uname').textContent=(user.displayName||'Alok जी')+' 🙏';
  pinBuf=''; updateDots();
  document.getElementById('pin-screen').style.display='flex';
}

function showLogin(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('pin-screen').style.display='none';
  document.getElementById('main-app').style.display='none';
}

function updateDots(){
  for(let i=0;i<4;i++){
    const d=document.getElementById('d'+i);
    d.classList.toggle('filled',i<pinBuf.length);
    d.classList.remove('error');
  }
}

function shakeErr(msg){
  for(let i=0;i<4;i++) document.getElementById('d'+i).classList.add('error');
  document.getElementById('pin-err').textContent=msg;
  setTimeout(()=>{ pinBuf=''; updateDots(); document.getElementById('pin-err').textContent=''; },900);
}

function processPin(){
  if(pinMode==='setup1'){
    pinTemp=pinBuf; pinBuf=''; updateDots(); pinMode='setup2';
    document.getElementById('pin-sub-text').textContent='✅ PIN फिर से डालें';
    document.getElementById('pin-err').textContent='';
  } else if(pinMode==='setup2'){
    if(pinBuf===pinTemp){ localStorage.setItem(getPinKey(),btoa(pinBuf)); unlockApp(); }
    else{ shakeErr('❌ PIN मेल नहीं खाया'); pinMode='setup1'; pinTemp=''; setTimeout(()=>{ document.getElementById('pin-sub-text').textContent='🔐 नया PIN बनाएं'; },900); }
  } else {
    try{
      const saved=atob(localStorage.getItem(getPinKey())||'');
      if(pinBuf===saved) unlockApp(); else shakeErr('❌ गलत PIN');
    }catch(e){ shakeErr('❌ गलत PIN'); }
  }
}

function unlockApp(){
  document.getElementById('pin-screen').style.display='none';
  document.getElementById('main-app').style.display='block';
  render();
}

function lockApp(){
  pinBuf=''; updateDots(); document.getElementById('pin-err').textContent='';
  if(localStorage.getItem(getPinKey())){ pinMode='enter'; document.getElementById('pin-sub-text').textContent='PIN डालें'; document.getElementById('pin-change-btn').style.display=''; }
  document.getElementById('main-app').style.display='none';
  document.getElementById('pin-screen').style.display='flex';
}

document.querySelectorAll('.pin-key').forEach(b=>b.addEventListener('click',()=>{
  if(pinBuf.length<4){ pinBuf+=b.dataset.k; updateDots(); if(pinBuf.length===4) setTimeout(processPin,150); }
}));
document.getElementById('pin-del').addEventListener('click',()=>{ if(pinBuf.length>0){pinBuf=pinBuf.slice(0,-1);updateDots();} });
document.getElementById('pin-logout-btn').addEventListener('click',async()=>{ if(confirm('Logout करें?')){ dbListeners.forEach(({r,fn})=>off(r,fn)); await signOut(auth); }});
document.getElementById('pin-change-btn').addEventListener('click',()=>{ if(confirm('PIN बदलें?')){ localStorage.removeItem(getPinKey()); pinMode='setup1'; pinBuf=''; updateDots(); document.getElementById('pin-sub-text').textContent='🔐 नया PIN बनाएं'; document.getElementById('pin-change-btn').style.display='none'; }});

// ── CRUD ───────────────────────────────────────
async function saveUdhar(e){
  e.createdAt=e.date||today();
  await dbSet(`udhars/${e.id}`, e);
  if(e.dueDate){
    const r={id:uid(),udhaarId:e.id,name:e.name,amount:e.amount,dueDate:e.dueDate,done:false,createdAt:today()};
    await dbSet(`reminders/${r.id}`, r);
  }
}
async function doSettle(uid_id){
  const u=S.udhars.find(x=>x.id===uid_id); if(!u) return;
  const upd={...u,settled:true,settledDate:today()};
  await dbSet(`udhars/${uid_id}`, upd);
  const rems=S.reminders.filter(r=>r.udhaarId===uid_id);
  for(const r of rems) await dbSet(`reminders/${r.id}`,{...r,done:true});
}
async function savePocket(e){ e.createdAt=e.date; await dbSet(`pocket/${e.id}`,e); }
async function saveReminder(r){ r.createdAt=today(); await dbSet(`reminders/${r.id}`,r); }
async function doneReminder(rid){ const r=S.reminders.find(x=>x.id===rid); if(r) await dbSet(`reminders/${rid}`,{...r,done:true}); }

// ── Share ───────────────────────────────────────
function shareUdhar(id){
  const u=S.udhars.find(x=>x.id==id); if(!u) return;
  const msg=`📒 *मेरा हिसाब — उधार रसीद*\n\n👤 नाम: ${u.name}\n💰 रकम: ${fmtAmt(u.amount)}\n📋 ${u.type==='lena'?'आपने मुझसे उधार लिया है':'मैंने आपसे उधार लिया है'}\n💳 माध्यम: ${u.mode==='cash'?'नकद (Cash)':'ऑनलाइन (UPI)'}\n${u.service&&u.service!=='general'?'📱 सेवा: '+u.service+'\n':''}📅 तारीख: ${fmtDate(u.createdAt)}\n${u.dueDate?'⏰ वापसी: '+fmtDate(u.dueDate)+'\n':''}\n${u.settled?'✅ चुकता हो गया है':'⏳ अभी बकाया है'}${u.note?'\n📝 नोट: '+u.note:''}`;
  if(navigator.share) navigator.share({title:'उधार — '+u.name,text:msg}).catch(()=>copyTxt(msg));
  else copyTxt(msg);
}
function copyTxt(t){ try{ navigator.clipboard.writeText(t).then(()=>toast('📋 WhatsApp के लिए Copy हो गया!')); }catch(e){ const a=document.createElement('textarea');a.value=t;a.style.cssText='position:fixed;opacity:0';document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);toast('📋 Copy हो गया!'); } }
function toast(msg){ const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000); }

// ── Computed ────────────────────────────────────
function activeU(){ return S.udhars.filter(u=>!u.settled); }
function totalLena(){ return activeU().filter(u=>u.type==='lena').reduce((s,u)=>s+Number(u.amount),0); }
function totalDena(){ return activeU().filter(u=>u.type==='dena').reduce((s,u)=>s+Number(u.amount),0); }
function allIn(){ return S.pocket.filter(t=>t.dir==='in').reduce((s,t)=>s+Number(t.amount),0); }
function allOut(){ return S.pocket.filter(t=>t.dir==='out').reduce((s,t)=>s+Number(t.amount),0); }
function bal(){ return allIn()-allOut(); }
function tIn(){ return S.pocket.filter(t=>t.date===today()&&t.dir==='in').reduce((s,t)=>s+Number(t.amount),0); }
function tOut(){ return S.pocket.filter(t=>t.date===today()&&t.dir==='out').reduce((s,t)=>s+Number(t.amount),0); }
function overdueU(){ return activeU().filter(u=>u.dueDate&&u.dueDate<today()); }

// ── Render ──────────────────────────────────────
function render(){ document.getElementById('app').innerHTML=buildApp(); attachEvents(); refreshSyncUI(); }
function buildApp(){ return buildPage()+buildNav()+buildModal(); }

function uRow(u){
  const ov=u.dueDate&&u.dueDate<today()&&!u.settled;
  const mc=u.mode==='cash'?'#16A34A':'#0EA5E9';
  const btns=!u.settled
    ?`<div class="a-row"><button class="s-btn" data-id="${u.id}">✅ चुकता करें</button><button class="sh-btn" data-id="${u.id}">📤 Share</button></div>`
    :`<div class="a-row"><span style="font-size:11px;color:#16A34A;font-weight:700">✅ चुकता</span><button class="sh-btn" data-id="${u.id}">📤 Share</button></div>`;
  return `<div class="row">
    <div style="flex:1">
      <div style="display:flex;align-items:center;gap:8px"><span style="font-weight:700;font-size:15px">${u.name}</span>${ov?'<span class="ob">⚠️ बकाया</span>':''}</div>
      <div class="row-meta">${bdg(mc,u.mode==='cash'?'💵 Cash':'📱 Online')}${u.service&&u.service!=='general'?bdg('#D97706',u.service):''}<span style="font-size:12px;color:#78716C">${fmtDate(u.createdAt)}</span></div>
      ${u.note?`<p style="font-size:12px;color:#78716C;margin-top:2px">${u.note}</p>`:''}
      ${btns}
    </div>
    <div style="text-align:right;margin-left:12px"><p style="font-weight:800;font-size:17px;color:${u.type==='lena'?'#16A34A':'#DC2626'}">${u.type==='lena'?'+':'-'}${fmtAmt(u.amount)}</p></div>
  </div>`;
}

function buildPage(){ switch(S.tab){ case 'dashboard':return buildDash(); case 'udhar':return buildUdhar(); case 'pocket':return buildPocket(); case 'history':return buildHistory(); case 'reminders':return buildReminders(); default:return buildDash(); } }

function buildDash(){
  const ov=overdueU();
  const ovH=ov.length>0?`<div class="alert-r"><p style="font-weight:700;color:#DC2626;margin-bottom:8px">⚠️ ${ov.length} उधार की तारीख निकल गई!</p>${ov.slice(0,3).map(u=>`<div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px"><span>${u.name}</span><span style="font-weight:700;color:#DC2626">${fmtAmt(u.amount)}</span></div>`).join('')}</div>`:'';
  const recU=activeU().slice(0,4);
  const recH=recU.length>0
    ?`<div class="card"><p style="font-weight:700;margin-bottom:12px">📒 हालिया उधार</p>${recU.map(u=>uRow(u)).join('')}${activeU().length>4?`<p class="see-all-u" style="text-align:center;color:#FF6B00;font-weight:700;cursor:pointer;margin-top:8px">सब देखें →</p>`:''}</div>`
    :`<div class="card" style="text-align:center;color:#78716C"><p style="font-size:32px">📒</p><p style="margin:4px 0">अभी कोई उधार नहीं</p><button class="btn btn-p" id="d-add-u" style="margin-top:8px">+ पहला उधार जोड़ें</button></div>`;
  return `<div class="page">
    <div class="header">
      <div class="header-top">
        <div><p style="color:#FFE4C4;font-size:13px;font-weight:600">नमस्ते ${currentUser?.displayName?.split(' ')[0]||'Alok'} जी 🙏</p><h1 style="color:#fff;font-size:26px;font-family:Georgia,serif;margin:4px 0 0">मेरा हिसाब</h1></div>
        <div class="header-btns"><button class="hdr-btn" id="lock-btn">🔒</button></div>
      </div>
      <div class="sync-bar"><span class="sync-dot" id="sync-dot"></span><span id="sync-txt">☁️ Cloud में Save</span></div>
    </div>
    <div class="px16">
      <div class="card card-green" style="margin-bottom:16px">
        <p style="font-size:13px;opacity:.85;margin-bottom:4px">💰 जेब में बचे</p>
        <p style="font-size:36px;font-weight:800;font-family:Georgia,serif">${fmtAmt(bal())}</p>
        <div style="display:flex;gap:20px;margin-top:12px">
          <div><p style="font-size:12px;opacity:.8">आज आया</p><p style="font-weight:700">${fmtAmt(tIn())}</p></div>
          <div><p style="font-size:12px;opacity:.8">आज गया</p><p style="font-weight:700">${fmtAmt(tOut())}</p></div>
        </div>
      </div>
      <div class="grid2">
        <div class="sb sg"><p class="sl">📥 मुझे मिलना है</p><p class="sv" style="color:#16A34A">${fmtAmt(totalLena())}</p><p style="font-size:12px;color:#78716C;margin-top:4px">${activeU().filter(u=>u.type==='lena').length} लोग</p></div>
        <div class="sb sr"><p class="sl">📤 मुझे देना है</p><p class="sv" style="color:#DC2626">${fmtAmt(totalDena())}</p><p style="font-size:12px;color:#78716C;margin-top:4px">${activeU().filter(u=>u.type==='dena').length} जगह</p></div>
      </div>
      ${ovH}
      <div class="card" style="margin-bottom:16px"><p style="font-weight:700;margin-bottom:12px">⚡ जल्दी करें</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button class="qa-btn" data-a="udhar" style="padding:12px 8px;border-radius:12px;border:2px solid #FF6B0020;background:#FF6B0010;color:#FF6B00;font-weight:700;font-size:13px;cursor:pointer">📒 उधार जोड़ें</button>
        <button class="qa-btn" data-a="pocket" style="padding:12px 8px;border-radius:12px;border:2px solid #DC262620;background:#DC262610;color:#DC2626;font-weight:700;font-size:13px;cursor:pointer">💸 खर्च जोड़ें</button>
        <button class="qa-btn" data-a="income" style="padding:12px 8px;border-radius:12px;border:2px solid #16A34A20;background:#16A34A10;color:#16A34A;font-weight:700;font-size:13px;cursor:pointer">💰 आमदनी जोड़ें</button>
        <button class="qa-btn" data-a="reminders" style="padding:12px 8px;border-radius:12px;border:2px solid #D9770620;background:#D9770610;color:#D97706;font-weight:700;font-size:13px;cursor:pointer">🔔 रिमाइंडर</button>
      </div></div>
      ${recH}
    </div>
  </div>`;
}

function buildUdhar(){
  let fi=S.udhars.filter(u=>S.udharFilter==='active'?!u.settled:S.udharFilter==='settled'?u.settled:true).filter(u=>u.name.toLowerCase().includes(S.udharSearch.toLowerCase()));
  const lT=fi.filter(u=>u.type==='lena'&&!u.settled).reduce((s,u)=>s+Number(u.amount),0);
  const dT=fi.filter(u=>u.type==='dena'&&!u.settled).reduce((s,u)=>s+Number(u.amount),0);
  return `<div class="page px16" style="padding-top:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h2 style="font-family:Georgia,serif">📒 उधार खाता</h2><button class="btn btn-p" style="padding:8px 16px;font-size:14px" id="add-u-btn">+ जोड़ें</button></div>
    ${S.udharFilter==='active'?`<div class="grid2"><div class="sb sg"><p class="sl">मिलना है</p><p class="sv" style="color:#16A34A">${fmtAmt(lT)}</p></div><div class="sb sr"><p class="sl">देना है</p><p class="sv" style="color:#DC2626">${fmtAmt(dT)}</p></div></div>`:''}
    <input class="si" id="u-search" placeholder="🔍 नाम खोजें..." value="${S.udharSearch}"/>
    <div class="ftabs">${['active|चालू','settled|चुकता','all|सब'].map(s=>{const[v,l]=s.split('|');return`<button class="ftab u-filter ${S.udharFilter===v?'active':''}" data-val="${v}">${l}</button>`;}).join('')}</div>
    ${fi.length===0?`<div class="empty"><p style="font-size:40px">📒</p><p>कोई उधार नहीं</p></div>`:fi.map(u=>uRow(u)).join('')}
  </div>`;
}

function buildPocket(){
  const dT=S.pocket.filter(t=>t.date===S.pocketDate);
  const dI=dT.filter(t=>t.dir==='in').reduce((s,t)=>s+Number(t.amount),0);
  const dO=dT.filter(t=>t.dir==='out').reduce((s,t)=>s+Number(t.amount),0);
  return `<div class="page px16" style="padding-top:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h2 style="font-family:Georgia,serif">👛 जेब खर्च</h2><div style="display:flex;gap:6px"><button class="btn btn-g" style="padding:8px 12px;font-size:13px" id="add-inc-btn">+ आमदनी</button><button class="btn btn-r" style="padding:8px 12px;font-size:13px" id="add-pkt-btn">+ खर्च</button></div></div>
    <div class="card card-green" style="margin-bottom:16px"><p style="font-size:13px;opacity:.85;margin-bottom:4px">कुल बचत</p><p style="font-size:36px;font-weight:800;font-family:Georgia,serif">${fmtAmt(bal())}</p></div>
    <input type="date" class="fi" id="pkt-date" value="${S.pocketDate}" style="margin-bottom:12px"/>
    <div class="grid2"><div class="sb sg"><p class="sl">इस दिन आया</p><p class="sv" style="color:#16A34A;font-size:18px">${fmtAmt(dI)}</p></div><div class="sb sr"><p class="sl">इस दिन गया</p><p class="sv" style="color:#DC2626;font-size:18px">${fmtAmt(dO)}</p></div></div>
    ${dT.length===0?`<div class="empty"><p style="font-size:40px">👛</p><p>इस दिन कोई लेनदेन नहीं</p></div>`:dT.map(t=>`<div class="row"><div><p style="font-weight:700">${t.category}</p><div class="row-meta">${bdg(t.mode==='cash'?'#16A34A':'#0EA5E9',t.mode==='cash'?'💵 Cash':'📱 Online')}${t.note?`<span style="font-size:12px;color:#78716C">${t.note}</span>`:''}</div></div><p style="font-weight:800;font-size:17px;color:${t.dir==='in'?'#16A34A':'#DC2626'}">${t.dir==='in'?'+':'-'}${fmtAmt(t.amount)}</p></div>`).join('')}
  </div>`;
}

function buildHistory(){
  const all=[...S.udhars.map(u=>({...u,_t:'udhar'})),...S.pocket.map(p=>({...p,_t:'pocket'}))].sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  const fi=S.historyType==='all'?all:S.historyType==='udhar'?all.filter(t=>t._t==='udhar'):all.filter(t=>t._t==='pocket');
  return `<div class="page px16" style="padding-top:16px">
    <h2 style="font-family:Georgia,serif;margin-bottom:16px">📜 पूरा इतिहास</h2>
    <div class="ftabs">${['all|सब','udhar|उधार','pocket|खर्च/आमदनी'].map(s=>{const[v,l]=s.split('|');return`<button class="ftab h-filter ${S.historyType===v?'active':''}" data-val="${v}">${l}</button>`;}).join('')}</div>
    ${fi.length===0?`<div class="empty"><p style="font-size:40px">📜</p><p>कोई रिकॉर्ड नहीं</p></div>`:fi.map(t=>{const ig=t._t==='udhar'?t.type==='lena':t.dir==='in';return`<div class="row"><div><div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap"><span style="font-weight:700">${t._t==='udhar'?t.name:t.category}</span>${bdg(t._t==='udhar'?'#FF6B00':'#D97706',t._t==='udhar'?'उधार':'खर्च')}${t.settled?bdg('#16A34A','✅ चुकता'):''}</div><div class="row-meta">${bdg(t.mode==='cash'?'#16A34A':'#0EA5E9',t.mode==='cash'?'💵 Cash':'📱 Online')}<span style="font-size:12px;color:#78716C">${fmtDate(t.createdAt||t.date)}</span></div></div><p style="font-weight:800;font-size:17px;color:${ig?'#16A34A':'#DC2626'}">${fmtAmt(t.amount)}</p></div>`;}).join('')}
  </div>`;
}

function buildReminders(){
  const ac=S.reminders.filter(r=>!r.done).sort((a,b)=>a.dueDate>b.dueDate?1:-1);
  const dn=S.reminders.filter(r=>r.done);
  return `<div class="page px16" style="padding-top:16px">
    <h2 style="font-family:Georgia,serif;margin-bottom:16px">🔔 रिमाइंडर</h2>
    <div class="card" style="margin-bottom:16px"><p style="font-weight:700;margin-bottom:12px">➕ नया रिमाइंडर</p>
      <label class="fl">📝 किसलिए?</label><input class="fi" id="r-name" placeholder="जैसे: बिजली बिल, उधार याद"/>
      <label class="fl">💰 रकम (वैकल्पिक)</label><input class="fi" id="r-amt" type="number" placeholder="0"/>
      <label class="fl">📅 याद दिलाने की तारीख</label><input class="fi" id="r-date" type="date"/>
      <label class="fl">📝 नोट</label><input class="fi" id="r-note" placeholder="कुछ जरूरी बात..."/>
      <button class="btn btn-p btn-full" id="add-rem-btn" style="margin-top:12px">🔔 जोड़ें</button>
    </div>
    <p style="font-weight:700;margin-bottom:8px">📌 आने वाले (${ac.length})</p>
    ${ac.length===0?'<p style="color:#78716C;margin-bottom:16px">कोई रिमाइंडर नहीं</p>':ac.map(r=>{const ov=r.dueDate<today();const dL=Math.ceil((new Date(r.dueDate)-new Date())/86400000);const msg=ov?`⚠️ ${Math.abs(dL)} दिन पहले था!`:dL===0?'🔴 आज!':`📅 ${dL} दिन बाद`;return`<div class="card" style="border:${ov?'1.5px solid #FECACA':'1px solid #FFE4C4'};background:${ov?'#FEF2F2':'#fff'}"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><p style="font-weight:700">${r.name}</p>${r.amount?`<p style="color:#16A34A;font-weight:700;margin:2px 0">${fmtAmt(r.amount)}</p>`:''}<p style="font-size:13px;color:${ov?'#DC2626':'#78716C'};margin:2px 0">${msg}</p>${r.note?`<p style="font-size:12px;color:#78716C;margin-top:4px">${r.note}</p>`:''}</div><button class="rem-done" data-id="${r.id}" style="background:#16A34A15;color:#16A34A;border:none;border-radius:10px;padding:6px 12px;cursor:pointer;font-weight:700;font-size:13px">✅ हो गया</button></div></div>`;}).join('')}
    ${dn.length>0?`<p style="font-weight:700;color:#78716C;margin-top:16px;margin-bottom:8px">✅ पूरे हुए (${dn.length})</p>${dn.slice(0,5).map(r=>`<div class="row" style="opacity:.6"><span>${r.name}</span>${r.amount?`<span style="font-weight:700">${fmtAmt(r.amount)}</span>`:''}</div>`).join('')}`:''}
  </div>`;
}

    <div style="display:flex;gap:8px;margin-bottom:14px"><button class="dir-btn" data-dir="in" style="flex:1;padding:10px 0;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;border:2px solid #16A34A;background:${dir==='in'?'#16A34A':'transparent'};color:${dir==='in'?'#fff':'#16A34A'}">💰 आमदनी</button><button class="dir-btn" data-dir="out" style="flex:1;padding:10px 0;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;border:2px solid #DC2626;background:${dir==='out'?'#DC2626':'transparent'};color:${dir==='out'?'#fff':'#DC2626'}">💸 खर्च</button></div>
    <label class="fl">💰 रकम (₹)</label><input class="fi" id="p-amt" type="number" placeholder="0" value="${f.amount||''}"/>

  if(S.modal==='settle'&&S.settleItem){ const u=S.settleItem; const mode=f.sm||'full'; title='✅ चुकता करें'; body=`
    <div style="background:#FFF8F0;border-radius:12px;padding:14px;margin-bottom:16px"><p style="font-weight:700;font-size:16px">${u.name}</p><p style="color:#78716C;margin-top:4px">${fmtAmt(u.amount)} • ${u.type==='lena'?'आपको मिलना था':'आपको देना था'}</p></div>
    <div style="display:flex;gap:8px;margin-bottom:14px"><button class="sm-btn" data-mode="full" style="flex:1;padding:10px 0;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;border:2px solid #FF6B00;background:${mode==='full'?'#FF6B00':'transparent'};color:${mode==='full'?'#fff':'#FF6B00'}">पूरा चुकता</button><button class="sm-btn" data-mode="partial" style="flex:1;padding:10px 0;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;border:2px solid #FF6B00;background:${mode==='partial'?'#FF6B00':'transparent'};color:${mode==='partial'?'#fff':'#FF6B00'}">आंशिक</button></div>
    ${mode==='partial'?`<label class="fl">कितना मिला/दिया? (₹)</label><input class="fi" id="s-amt" type="number" placeholder="0"/>`:''}
    <button class="btn btn-g btn-full" id="confirm-s">✅ चुकता करें</button>`; }
  return `<div class="modal-overlay" id="m-ov"><div class="modal-box"><div class="modal-header"><h3 style="font-family:Georgia,serif;font-size:20px">${title}</h3><button class="modal-close" id="close-m">✕</button></div>${body}</div></div>`;
}

function buildNav(){ return `<div class="bottom-nav">${[['dashboard','🏠','होम'],['udhar','📒','उधार'],['pocket','👛','जेब'],['history','📜','इतिहास'],['reminders','🔔','रिमाइंडर']].map(([t,ic,lb])=>`<button class="nav-btn ${S.tab===t?'active':''}" data-tab="${t}"><span class="nav-icon">${ic}</span>${lb}</button>`).join('')}</div>`; }

function attachEvents(){
  document.querySelectorAll('.nav-btn').forEach(b=>b.onclick=()=>{ S.tab=b.dataset.tab;mf={};render(); });
  const lb=document.getElementById('lock-btn'); if(lb) lb.onclick=()=>lockApp();
  const mo=document.getElementById('m-ov'); if(mo) mo.onclick=e=>{ if(e.target===mo){S.modal=null;mf={};render();} };
  const cm=document.getElementById('close-m'); if(cm) cm.onclick=()=>{S.modal=null;mf={};render();};
  document.querySelectorAll('.qa-btn').forEach(b=>b.onclick=()=>{ const a=b.dataset.a; if(a==='reminders'){S.tab='reminders';render();}else{S.modal=a;mf={dir:a==='income'?'in':'out'};render();} });
  const dau=document.getElementById('d-add-u'); if(dau) dau.onclick=()=>{ S.modal='udhar';mf={};render(); };
  const sa=document.querySelector('.see-all-u'); if(sa) sa.onclick=()=>{ S.tab='udhar';render(); };
  const aub=document.getElementById('add-u-btn'); if(aub) aub.onclick=()=>{ S.modal='udhar';mf={};render(); };
  const us=document.getElementById('u-search'); if(us) us.oninput=e=>{ S.udharSearch=e.target.value;render(); };
  document.querySelectorAll('.u-filter').forEach(b=>b.onclick=()=>{ S.udharFilter=b.dataset.val;render(); });
  document.querySelectorAll('.s-btn').forEach(b=>b.onclick=()=>{ const u=S.udhars.find(x=>x.id==b.dataset.id); if(u){S.settleItem=u;S.modal='settle';mf={};render();} });
  document.querySelectorAll('.sh-btn').forEach(b=>b.onclick=()=>shareUdhar(b.dataset.id));
  const apb=document.getElementById('add-pkt-btn'); if(apb) apb.onclick=()=>{ S.modal='pocket';mf={dir:'out'};render(); };
  const aib=document.getElementById('add-inc-btn'); if(aib) aib.onclick=()=>{ S.modal='income';mf={dir:'in'};render(); };
  const pd=document.getElementById('pkt-date'); if(pd) pd.onchange=e=>{ S.pocketDate=e.target.value;render(); };
  document.querySelectorAll('.h-filter').forEach(b=>b.onclick=()=>{ S.historyType=b.dataset.val;render(); });
  const arb=document.getElementById('add-rem-btn'); if(arb) arb.onclick=async()=>{ const name=document.getElementById('r-name').value.trim(); const dd=document.getElementById('r-date').value; if(!name||!dd){alert('नाम और तारीख भरें!');return;} await saveReminder({id:uid(),name,amount:Number(document.getElementById('r-amt').value)||0,dueDate:dd,note:document.getElementById('r-note').value,done:false}); };
  document.querySelectorAll('.rem-done').forEach(b=>b.onclick=async()=>{ await doneReminder(b.dataset.id); });
  document.querySelectorAll('.dir-btn').forEach(b=>b.onclick=()=>{ mf.dir=b.dataset.dir;mf.category='';render(); });
  document.querySelectorAll('.sm-btn').forEach(b=>b.onclick=()=>{ mf.sm=b.dataset.mode;render(); });
  const su=document.getElementById('submit-u'); if(su) su.onclick=async()=>{ const name=document.getElementById('m-name').value.trim(); const amount=Number(document.getElementById('m-amt').value); if(!name||!amount){alert('नाम और रकम भरें!');return;} await saveUdhar({id:uid(),name,amount,type:document.getElementById('m-type').value,mode:document.getElementById('m-mode').value,service:document.getElementById('m-svc').value,date:document.getElementById('m-date').value,dueDate:document.getElementById('m-due').value,note:document.getElementById('m-note').value,settled:false}); S.modal=null;mf={}; };
  const sp=document.getElementById('submit-p'); if(sp) sp.onclick=async()=>{ const amount=Number(document.getElementById('p-amt').value); if(!amount){alert('रकम भरें!');return;} const dir=document.getElementById('p-dir').value; await savePocket({id:uid(),amount,dir,category:document.getElementById('p-cat').value,mode:document.getElementById('p-mode').value,date:document.getElementById('p-date').value,note:document.getElementById('p-note').value}); S.modal=null;mf={}; };
  const cs=document.getElementById('confirm-s'); if(cs) cs.onclick=async()=>{ const mode=mf.sm||'full'; if(mode==='partial'&&!Number(document.getElementById('s-amt')?.value)){alert('रकम भरें!');return;} await doSettle(S.settleItem.id); S.modal=null;S.settleItem=null;mf={}; };
}
</script>
</body>
</html>
