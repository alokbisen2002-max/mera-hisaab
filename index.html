<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#FF6B00"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="मेरा हिसाब"/>
<title>मेरा हिसाब 🔒</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{background:#FFF8F0;font-family:'Noto Sans Devanagari','Segoe UI',sans-serif;color:#1C1917;overscroll-behavior:none}
button,input,select,textarea{font-family:'Noto Sans Devanagari','Segoe UI',sans-serif}

/* SPLASH */
#splash{position:fixed;inset:0;background:linear-gradient(160deg,#FF6B00,#CC4400);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.sp-logo{font-size:64px;animation:pop .4s}
@keyframes pop{0%{transform:scale(.5)}100%{transform:scale(1)}}
.sp-title{color:#fff;font-size:30px;font-family:Georgia,serif}
.sp-sub{color:#FFE4C4;font-size:14px}
.spin{width:32px;height:32px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite;margin-top:16px}
@keyframes sp{to{transform:rotate(360deg)}}

/* LOGIN SCREEN */
#login-screen{position:fixed;inset:0;background:linear-gradient(160deg,#FF6B00,#CC4400);z-index:998;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-y:auto}
.login-logo{font-size:52px;margin-bottom:6px;text-align:center}
.login-title{color:#fff;font-size:26px;font-family:Georgia,serif;margin-bottom:4px;text-align:center}
.login-sub{color:#FFE4C4;font-size:13px;margin-bottom:24px;text-align:center;line-height:1.5}
.login-box{background:rgba(255,255,255,.15);border-radius:20px;padding:20px;width:100%;max-width:340px;backdrop-filter:blur(10px)}
.login-tabs{display:flex;gap:0;margin-bottom:20px;background:rgba(0,0,0,.15);border-radius:12px;padding:3px}
.login-tab{flex:1;padding:8px 0;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;color:rgba(255,255,255,.7);background:transparent;transition:.2s}
.login-tab.on{background:#fff;color:#FF6B00}
.linput{width:100%;border:none;border-radius:12px;padding:12px 14px;font-size:15px;color:#1C1917;background:#fff;outline:none;margin-bottom:10px}
.linput:focus{box-shadow:0 0 0 2px #FFE4C4}
.login-btn{width:100%;background:#1C1917;color:#fff;border:none;border-radius:12px;padding:13px;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px}
.login-btn:active{transform:scale(.98)}
.login-err{color:#FFD0D0;font-size:13px;text-align:center;margin-top:8px;min-height:18px}
.login-hint{color:#FFE4C4;font-size:12px;text-align:center;margin-top:12px;line-height:1.5}

/* PIN SCREEN */
#pin-screen{position:fixed;inset:0;background:linear-gradient(160deg,#FF6B00,#CC4400);z-index:997;display:none;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px}
.pin-user{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.pin-email{color:#FFE4C4;font-size:12px;margin-top:2px}
.pin-sub{color:#FFE4C4;font-size:13px;margin-bottom:28px;text-align:center;line-height:1.5}
.pin-dots{display:flex;gap:16px;margin-bottom:28px}
.dot{width:18px;height:18px;border-radius:50%;border:2px solid #FFE4C4;background:transparent;transition:.2s}
.dot.filled{background:#fff;border-color:#fff}
.dot.err{background:#FF6B6B;border-color:#FF6B6B;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px}
.key{background:rgba(255,255,255,.15);border:none;border-radius:16px;padding:18px 0;font-size:24px;font-weight:700;color:#fff;cursor:pointer}
.key:active{background:rgba(255,255,255,.35);transform:scale(.94)}
.key.zero{grid-column:2}
.key.del{background:rgba(255,100,100,.2);color:#FFD0D0}
.pin-err{color:#FFD0D0;font-size:13px;margin-top:10px;height:18px;text-align:center}
.pin-links{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap;justify-content:center}
.plink{color:#FFE4C4;font-size:12px;text-decoration:underline;cursor:pointer;background:none;border:none}

/* SYNC */
.sync-bar{font-size:11px;color:#FFE4C4;margin-top:5px;display:flex;align-items:center;gap:5px}
.sdot{width:7px;height:7px;border-radius:50%;background:#4ADE80;flex-shrink:0}
.sdot.ing{background:#FCD34D;animation:pulse .8s infinite}
.sdot.off{background:#F87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* APP */
#app-wrap{display:none;max-width:480px;margin:0 auto;min-height:100vh}
.page{padding-bottom:80px;min-height:100vh}
.hdr{background:linear-gradient(135deg,#FF6B00,#CC5500);padding:24px 20px 16px;border-radius:0 0 28px 28px;margin-bottom:18px}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start}
.hdr-btns{display:flex;gap:8px}
.hdr-btn{background:rgba(255,255,255,.2);border:none;border-radius:50%;width:36px;height:36px;font-size:17px;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px #FF6B0015;border:1px solid #FFE4C4;margin-bottom:14px}
.card-g{background:linear-gradient(135deg,#16A34A,#15803D);color:#fff}
.card-blue{background:linear-gradient(135deg,#1D4ED8,#1E40AF);color:#fff}
.px{padding:0 16px}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1.5px solid #FFE4C4;display:flex;z-index:50}
.nb{flex:1;padding:8px 0;background:transparent;border:none;cursor:pointer;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:2px;color:#78716C}
.nb.on{color:#FF6B00;font-weight:700}
.ni{font-size:18px}
.mov{position:fixed;inset:0;background:#00000060;z-index:100;display:flex;align-items:flex-end;justify-content:center}
.mbox{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:24px;max-height:92vh;overflow-y:auto}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mcls{background:#F5F5F5;border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:18px}
.fl{font-size:13px;color:#78716C;font-weight:600;display:block;margin-bottom:4px;margin-top:12px}
.fi{width:100%;border:1.5px solid #FFE4C4;border-radius:10px;padding:10px 12px;font-size:15px;color:#1C1917;background:#FFF8F0;outline:none}
.fi:focus{border-color:#FF6B00}
textarea.fi{resize:vertical;min-height:70px}
.btn{border-radius:12px;padding:10px 20px;font-weight:700;font-size:15px;cursor:pointer;border:none}
.bp{background:#FF6B00;color:#fff}
.bg{background:#16A34A;color:#fff}
.br{background:#DC2626;color:#fff}
.bblue{background:#1D4ED8;color:#fff}
.bfw{width:100%;margin-top:10px;display:block}
.bdg{padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.ftabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.ftab{padding:7px 14px;border-radius:20px;font-weight:700;font-size:13px;cursor:pointer;border:2px solid #FF6B00;background:transparent;color:#FF6B00}
.ftab.on{background:#FF6B00;color:#fff}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #FFE4C4}
.rmeta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;align-items:center}
.arow{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.sbtn{font-size:11px;background:#FF6B0020;color:#FF6B00;border:none;border-radius:8px;padding:3px 8px;cursor:pointer;font-weight:700}
.shbtn{font-size:11px;background:#0EA5E920;color:#0EA5E9;border:none;border-radius:8px;padding:3px 8px;cursor:pointer;font-weight:700}
.edit-btn{font-size:11px;background:#7C3AED20;color:#7C3AED;border:none;border-radius:8px;padding:3px 8px;cursor:pointer;font-weight:700}
.alr{background:#FEF2F2;border:1.5px solid #FECACA;border-radius:14px;padding:14px;margin-bottom:14px}
.si{width:100%;border:1.5px solid #FFE4C4;border-radius:10px;padding:10px 12px;font-size:14px;background:#FFF8F0;outline:none;margin-bottom:10px}
.empty{text-align:center;padding:40px;color:#78716C}
.sb{border-radius:12px;padding:12px}
.sg{background:#F0FDF4;border:1.5px solid #BBF7D0}
.sr{background:#FEF2F2;border:1.5px solid #FECACA}
.sbl{background:#EFF6FF;border:1.5px solid #BFDBFE}
.sl{font-size:12px;color:#78716C}
.sv{font-weight:800;font-size:20px}
.ob{font-size:11px;background:#FEE2E2;color:#DC2626;padding:1px 6px;border-radius:8px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1C1917;color:#fff;padding:12px 20px;border-radius:20px;font-size:13px;z-index:400;max-width:90vw;text-align:center;pointer-events:none}
.reg-card{background:#fff;border-radius:16px;padding:14px;box-shadow:0 2px 12px #1D4ED815;border:1px solid #BFDBFE;margin-bottom:12px}
.reg-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;border-bottom:1px solid #F0F7FF}
.status-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="sp-logo">📒</div>
  <h2 class="sp-title">मेरा हिसाब</h2>
  <p class="sp-sub">आपका पैसा, आपका हिसाब</p>
  <div class="spin"></div>
</div>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-logo">📒</div>
  <h2 class="login-title">मेरा हिसाब</h2>
  <p class="login-sub">Login करें — सभी devices पर<br>data sync होगा ☁️</p>
  <div class="login-box">
    <div class="login-tabs">
      <button class="login-tab on" id="tab-login" onclick="switchTab('login')">Login करें</button>
      <button class="login-tab" id="tab-register" onclick="switchTab('register')">नया Account</button>
    </div>
    <input class="linput" id="l-email" type="email" placeholder="📧 Email (जैसे: alok@gmail.com)" autocomplete="email"/>
    <input class="linput" id="l-pass" type="password" placeholder="🔑 Password (कम से कम 6 अक्षर)" autocomplete="current-password"/>
    <p id="l-name-row" style="display:none"><input class="linput" id="l-name" type="text" placeholder="👤 आपका नाम"/></p>
    <button class="login-btn" id="login-btn-main">Login करें →</button>
    <p class="login-err" id="login-err"></p>
    <p class="login-hint" id="login-hint">पहली बार? "नया Account" tab से register करें</p>
  </div>
</div>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="pin-user">
    <div>
      <p style="color:#fff;font-size:16px;font-weight:700" id="pin-name">Alok जी 🙏</p>
      <p class="pin-email" id="pin-email"></p>
    </div>
  </div>
  <p class="pin-sub" id="pin-msg">PIN डालें और अंदर आएं</p>
  <div class="pin-dots">
    <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
  </div>
  <div class="keypad">
    <button class="key" data-k="1">1</button><button class="key" data-k="2">2</button><button class="key" data-k="3">3</button>
    <button class="key" data-k="4">4</button><button class="key" data-k="5">5</button><button class="key" data-k="6">6</button>
    <button class="key" data-k="7">7</button><button class="key" data-k="8">8</button><button class="key" data-k="9">9</button>
    <button class="key zero" data-k="0">0</button><button class="key del" id="del-btn">⌫</button>
  </div>
  <p class="pin-err" id="pin-err"></p>
  <div class="pin-links">
    <button class="plink" id="change-pin-btn">🔑 PIN बदलें</button>
    <button class="plink" id="logout-btn">🚪 Logout</button>
  </div>
</div>

<!-- APP -->
<div id="app-wrap"><div id="app"></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
         signOut, onAuthStateChanged, updateProfile }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, onValue, off }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ── Firebase Config ─────────────────────
const FC = {
  apiKey:            "AIzaSyCL9GxYjDnWiSLDU-f1rdZyzZMhi6PziJY",
  authDomain:        "mera-hisaab-778fa.firebaseapp.com",
  databaseURL:       "https://mera-hisaab-778fa-default-rtdb.firebaseio.com",
  projectId:         "mera-hisaab-778fa",
  storageBucket:     "mera-hisaab-778fa.firebasestorage.app",
  messagingSenderId: "718237862704",
  appId:             "1:718237862704:web:a870d537a584786aa0d6f5"
};

const fapp = initializeApp(FC);
const auth = getAuth(fapp);
const db   = getDatabase(fapp);

// ── Helpers ─────────────────────────────
const today  = () => new Date().toISOString().split('T')[0];
const uid    = () => Date.now()+'_'+Math.random().toString(36).slice(2,6);
const fmtDate= d=>{ try{return new Date(d).toLocaleDateString('hi-IN',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return d||'';} };
const fmtAmt = n=>'₹'+Math.abs(Number(n)||0).toLocaleString('en-IN');
const bdg    = (c,t)=>`<span class="bdg" style="background:${c}20;color:${c}">${t}</span>`;
const g      = id=>document.getElementById(id);
const gv     = id=>{ const e=g(id); return e?e.value.trim():''; };

function toast(m,dur=3000){
  const t=document.createElement('div'); t.className='toast'; t.textContent=m;
  document.body.appendChild(t); setTimeout(()=>t.remove(),dur);
}

// ── App State ───────────────────────────
let currentUser=null, fbUID='', syncSt='synced', dbListeners=[];
let LS={udhars:[],pocket:[],reminders:[],registry:[]};
let S={tab:'dashboard',modal:null,settleItem:null,udharFilter:'active',
       udharSearch:'',historyType:'all',pocketDate:today(),regFilter:'all',regSearch:''};
let mf={};
let pinBuf='', pinMode='enter', pinTemp='';
const PIN_KEY=()=>'mh_pin_'+fbUID;
let appUnlocked=false;

// ── LocalStorage backup ─────────────────
function lsSave(key){ try{localStorage.setItem('mh_'+fbUID+'_'+key,JSON.stringify(LS[key]));}catch(e){} }
function lsLoad(){
  if(!fbUID) return;
  ['udhars','pocket','reminders','registry'].forEach(k=>{
    try{ const d=localStorage.getItem('mh_'+fbUID+'_'+k); if(d) LS[k]=JSON.parse(d); }catch(e){}
  });
}

// ── Sync UI ─────────────────────────────
function setSyncing(){ syncSt='syncing'; refreshSync(); }
function setSynced(){  syncSt='synced';  refreshSync(); }
function setOffline(){ syncSt='offline'; refreshSync(); }
function refreshSync(){
  const d=g('sdot'), t=g('stxt'); if(!d||!t) return;
  if(syncSt==='synced'){ d.className='sdot'; t.textContent='☁️ Cloud में Save है'; }
  else if(syncSt==='syncing'){ d.className='sdot ing'; t.textContent='💾 Save हो रहा है...'; }
  else { d.className='sdot off'; t.textContent='📴 Offline — Phone में Save'; }
}

// ── DB ──────────────────────────────────
function uref(path){ return ref(db,'users/'+fbUID+'/'+path); }

async function dbSet(path,data){
  lsSave(path.split('/')[0]);
  setSyncing();
  try{ await set(uref(path),data); setSynced(); }
  catch(e){ setOffline(); }
}

function startListeners(){
  dbListeners.forEach(({r,fn})=>off(r,fn)); dbListeners=[];
  let loaded=0;
  ['udhars','pocket','reminders','registry'].forEach(key=>{
    const r=uref(key);
    const fn=onValue(r,snap=>{
      const val=snap.val();
      LS[key]=val?Object.values(val).sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||'')):[];
      lsSave(key); loaded++;
      if(appUnlocked) render();
      else if(loaded>=4){ showPin(); }
    }, ()=>{ setOffline(); lsLoad(); showPin(); });
    dbListeners.push({r,fn});
  });
  setTimeout(()=>{ if(!appUnlocked){ lsLoad(); showPin(); } },5000);
}

// ── AUTH ────────────────────────────────
onAuthStateChanged(auth, user=>{
  g('splash').style.display='none';
  if(user){
    currentUser=user; fbUID=user.uid;
    startListeners();
  } else {
    showLoginScreen();
  }
});

// Login tab switch
window.switchTab=function(tab){
  const isReg=tab==='register';
  g('tab-login').classList.toggle('on',!isReg);
  g('tab-register').classList.toggle('on',isReg);
  g('l-name-row').style.display=isReg?'block':'none';
  g('login-btn-main').textContent=isReg?'Account बनाएं →':'Login करें →';
  g('login-hint').textContent=isReg?'पहले से account है? "Login करें" tab पर जाएं':'पहली बार? "नया Account" tab से register करें';
  g('login-err').textContent='';
};

function showLoginScreen(){
  g('login-screen').style.display='flex';
  g('pin-screen').style.display='none';
  g('app-wrap').style.display='none';
  appUnlocked=false;
}

g('login-btn-main').onclick=async()=>{
  const email=gv('l-email'), pass=gv('l-pass'), name=gv('l-name');
  const isReg=g('tab-register').classList.contains('on');
  g('login-err').textContent='';
  if(!email||!pass){ g('login-err').textContent='⚠️ Email और Password भरें'; return; }
  if(pass.length<6){ g('login-err').textContent='⚠️ Password कम से कम 6 अक्षर'; return; }
  const btn=g('login-btn-main'); btn.textContent='⏳...'; btn.disabled=true;
  try{
    if(isReg){
      if(!name){ g('login-err').textContent='⚠️ नाम भरें'; btn.textContent='Account बनाएं →'; btn.disabled=false; return; }
      const uc=await createUserWithEmailAndPassword(auth,email,pass);
      await updateProfile(uc.user,{displayName:name});
    } else {
      await signInWithEmailAndPassword(auth,email,pass);
    }
  } catch(err){
    btn.textContent=isReg?'Account बनाएं →':'Login करें →'; btn.disabled=false;
    const msgs={'auth/email-already-in-use':'यह email पहले से registered है, Login करें','auth/user-not-found':'Email नहीं मिला, पहले Register करें','auth/wrong-password':'Password गलत है','auth/invalid-email':'Email सही नहीं है','auth/invalid-credential':'Email या Password गलत है'};
    g('login-err').textContent=msgs[err.code]||'Error: '+err.message;
  }
};

// Enter key support
['l-email','l-pass','l-name'].forEach(id=>{ const el=g(id); if(el) el.addEventListener('keydown',e=>{ if(e.key==='Enter') g('login-btn-main').click(); }); });

// ── PIN ─────────────────────────────────
function showPin(){
  g('login-screen').style.display='none';
  g('app-wrap').style.display='none';
  appUnlocked=false;
  const saved=localStorage.getItem(PIN_KEY());
  if(!saved){
    pinMode='setup1';
    g('pin-msg').textContent='🔐 नया 4 अंक PIN बनाएं';
    g('change-pin-btn').style.display='none';
  } else {
    pinMode='enter';
    g('pin-msg').textContent='PIN डालें और अंदर आएं 👇';
    g('change-pin-btn').style.display='';
  }
  const n=currentUser?.displayName||currentUser?.email?.split('@')[0]||'Alok';
  g('pin-name').textContent=n+' जी 🙏';
  g('pin-email').textContent=currentUser?.email||'';
  pinBuf=''; updateDots();
  g('pin-screen').style.display='flex';
}

function updateDots(){
  for(let i=0;i<4;i++){
    g('d'+i).classList.toggle('filled',i<pinBuf.length);
    g('d'+i).classList.remove('err');
  }
}

function shakeErr(msg){
  for(let i=0;i<4;i++) g('d'+i).classList.add('err');
  g('pin-err').textContent=msg;
  setTimeout(()=>{ pinBuf=''; updateDots(); g('pin-err').textContent=''; },900);
}

function processPin(){
  if(pinMode==='setup1'){
    pinTemp=pinBuf; pinBuf=''; updateDots(); pinMode='setup2';
    g('pin-msg').textContent='✅ PIN फिर से डालें (confirm)';
    g('pin-err').textContent='';
  } else if(pinMode==='setup2'){
    if(pinBuf===pinTemp){
      localStorage.setItem(PIN_KEY(),btoa(pinBuf));
      unlockApp();
    } else {
      shakeErr('❌ PIN मेल नहीं खाया'); pinMode='setup1'; pinTemp='';
      setTimeout(()=>{ g('pin-msg').textContent='🔐 नया 4 अंक PIN बनाएं'; },900);
    }
  } else {
    try{
      const saved=atob(localStorage.getItem(PIN_KEY())||'');
      if(pinBuf===saved) unlockApp(); else shakeErr('❌ गलत PIN! फिर कोशिश करें');
    }catch(e){ shakeErr('❌ गलत PIN'); }
  }
}

function unlockApp(){

  g('app-wrap').style.display='block';
  appUnlocked=true;
  render();
}

function lockApp(){

// ── CRUD ────────────────────────────────
async function saveUdhar(e){
  e.createdAt=e.date||today();
  const i=LS.udhars.findIndex(x=>x.id===e.id);
  if(i>=0) LS.udhars[i]=e; else LS.udhars.unshift(e);
  lsSave('udhars'); await dbSet('udhars/'+e.id,e);
  if(e.dueDate&&i<0){ const r={id:uid(),udhaarId:e.id,name:e.name,amount:e.amount,dueDate:e.dueDate,done:false,createdAt:today()}; LS.reminders.push(r); lsSave('reminders'); await dbSet('reminders/'+r.id,r); }
  S.modal=null; mf={}; render(); toast('✅ उधार save हो गया!');
}

async function settleUdhar(id){
  const u=LS.udhars.find(x=>x.id===id); if(!u) return;
  const upd={...u,settled:true,settledDate:today()};
  const i=LS.udhars.findIndex(x=>x.id===id); if(i>=0) LS.udhars[i]=upd;
  lsSave('udhars'); await dbSet('udhars/'+id,upd);
  for(const r of LS.reminders.filter(x=>x.udhaarId===id)){ const ri=LS.reminders.findIndex(x=>x.id===r.id); if(ri>=0) LS.reminders[ri]={...r,done:true}; await dbSet('reminders/'+r.id,{...r,done:true}); }
  lsSave('reminders'); S.modal=null; S.settleItem=null; mf={}; render(); toast('✅ चुकता हो गया!');
}

async function savePocket(e){
  e.createdAt=e.date;
  const i=LS.pocket.findIndex(x=>x.id===e.id);
  if(i>=0) LS.pocket[i]=e; else LS.pocket.unshift(e);
  lsSave('pocket'); await dbSet('pocket/'+e.id,e);
  S.modal=null; mf={}; render(); toast('✅ Save हो गया!');
}

async function saveRem(r){ r.createdAt=today(); LS.reminders.push(r); lsSave('reminders'); await dbSet('reminders/'+r.id,r); S.modal=null; render(); toast('✅ रिमाइंडर जुड़ गया!'); }
async function doneRem(id){ const r=LS.reminders.find(x=>x.id===id); if(!r) return; const ri=LS.reminders.findIndex(x=>x.id===id); LS.reminders[ri]={...r,done:true}; lsSave('reminders'); await dbSet('reminders/'+id,{...r,done:true}); render(); }

async function saveReg(e){
  e.createdAt=e.docDate||today();
  e.totalCost=(Number(e.typingFee)||0)+(Number(e.registrationFee)||0)+(Number(e.challanFee)||0)+(Number(e.dataEntryFee)||0)+(Number(e.otherCost)||0);
  e.profit=(Number(e.clientCharge)||0)-e.totalCost;
  const i=LS.registry.findIndex(x=>x.id===e.id);
  if(i>=0) LS.registry[i]=e; else LS.registry.unshift(e);
  lsSave('registry'); await dbSet('registry/'+e.id,e);
  S.modal=null; mf={}; render(); toast('✅ Document save हो गया!');
}

function shareU(id){

  if(navigator.share) navigator.share({title:'उधार',text:msg}).catch(()=>copyTxt(msg)); else copyTxt(msg);

function shareReg(id){
  const r=LS.registry.find(x=>x.id==id); if(!r) return;
  const msg=`📄 *Document Record*\n👤 ${r.clientName} | ${r.docType}\n📅 ${fmtDate(r.docDate)}\n\n💰 Client से: ${fmtAmt(r.clientCharge)}\n🧾 कुल खर्च: ${fmtAmt(r.totalCost)}\n${r.profit>=0?'📈 मुनाफा':'📉 घाटा'}: ${fmtAmt(Math.abs(r.profit))}`;

function copyTxt(t){ try{navigator.clipboard.writeText(t).then(()=>toast('📋 Copy हो गया!'));}catch(e){const a=document.createElement('textarea');a.value=t;a.style.cssText='position:fixed;opacity:0';document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);toast('📋 Copy हो गया!');} }

          <div class="reg-row"><span>Registration</span><span>${fmtAmt(r.registrationFee)}</span></div>

          ${Number(r.dataEntryFee)>0?`<div class="reg-row"><span>Data Entry</span><span>${fmtAmt(r.dataEntryFee)}</span></div>`:''}
          ${Number(r.otherCost)>0?`<div class="reg-row"><span>अन्य</span><span>${fmtAmt(r.otherCost)}</span></div>`:''}
          <div style="display:flex;justify-content:space-between;padding-top:6px;margin-top:4px;border-top:1.5px solid #BFDBFE"><span style="font-weight:700">कुल खर्च</span><span style="font-weight:700;color:#DC2626">${fmtAmt(r.totalCost)}</span></div>
        </div>
        ${r.notes?`<p style="font-size:12px;color:#78716C;margin-bottom:8px">📝 ${r.notes}</p>`:''}
        <div class="arow"><button class="edit-btn reg-edit" data-id="${r.id}">✏️ Edit</button><button class="shbtn reg-share" data-id="${r.id}">📤 Share</button>${r.status!=='complete'?`<button class="sbtn reg-done" data-id="${r.id}">✅ पूर्ण करें</button>`:''}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function pgHistory(){
  const all=[...LS.udhars.map(u=>({...u,_t:'udhar'})),...LS.pocket.map(p=>({...p,_t:'pocket'})),...LS.registry.map(r=>({...r,_t:'registry'}))].sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  const fi=S.historyType==='all'?all:all.filter(t=>t._t===S.historyType);
  return `<div class="page px" style="padding-top:16px">
    <h2 style="font-family:Georgia,serif;margin-bottom:14px">📜 पूरा इतिहास</h2>
    <div class="ftabs">${['all|सब','udhar|उधार','pocket|खर्च','registry|Document'].map(s=>{const[v,l]=s.split('|');return`<button class="ftab hf ${S.historyType===v?'on':''}" data-val="${v}">${l}</button>`;}).join('')}</div>
    ${fi.length===0?`<div class="empty"><p style="font-size:40px">📜</p><p>कोई रिकॉर्ड नहीं</p></div>`:fi.map(t=>{
      if(t._t==='registry'){ const p=Number(t.profit||0); return `<div class="row"><div><div style="display:flex;gap:6px;flex-wrap:wrap"><span style="font-weight:700">${t.clientName}</span>${bdg('#1D4ED8','📄 Doc')}</div><div class="rmeta"><span style="font-size:12px;color:#78716C">${t.docType} • ${fmtDate(t.docDate)}</span></div></div><p style="font-weight:800;font-size:16px;color:${p>=0?'#16A34A':'#DC2626'}">${p>=0?'+':'-'}${fmtAmt(Math.abs(p))}</p></div>`; }
      const ig=t._t==='udhar'?t.type==='lena':t.dir==='in';
      return `<div class="row"><div><div style="display:flex;gap:6px;flex-wrap:wrap"><span style="font-weight:700">${t._t==='udhar'?t.name:t.category}</span>${bdg(t._t==='udhar'?'#FF6B00':'#D97706',t._t==='udhar'?'उधार':'खर्च')}${t.settled?bdg('#16A34A','✅'):''}</div><div class="rmeta">${bdg(t.mode==='cash'?'#16A34A':'#0EA5E9',t.mode==='cash'?'Cash':'Online')}<span style="font-size:12px;color:#78716C">${fmtDate(t.createdAt||t.date)}</span></div></div><p style="font-weight:800;font-size:17px;color:${ig?'#16A34A':'#DC2626'}">${fmtAmt(t.amount)}</p></div>`;
    }).join('')}
  </div>`;
}

function buildModal(){
  if(!S.modal) return ''; let title='',body=''; const f=mf;
  if(S.modal==='udhar'){
    title='📒 नया उधार जोड़ें';
    body=`<label class="fl">👤 व्यक्ति का नाम *</label><input class="fi" id="mn" placeholder="जैसे: राम भाऊ" value="${f.name||''}"/>
    <label class="fl">💰 रकम (₹) *</label><input class="fi" id="ma" type="number" placeholder="0" value="${f.amount||''}"/>
    <label class="fl">📋 प्रकार</label><select class="fi" id="mt"><option value="lena">मुझे लेना है (उन्होंने उधार लिया)</option><option value="dena">मुझे देना है (मैंने उधार लिया)</option></select>
    <label class="fl">💳 माध्यम</label><select class="fi" id="mm"><option value="cash">नकद (Cash)</option><option value="online">ऑनलाइन (UPI)</option></select>
    <label class="fl">📱 सेवा</label><select class="fi" id="ms"><option value="general">सामान्य</option><option value="jio">Jio</option><option value="airtel">Airtel</option><option value="vi">Vi</option><option value="bsnl">BSNL</option><option value="other">अन्य</option></select>
    <label class="fl">📅 तारीख</label><input class="fi" id="md" type="date" value="${f.date||today()}"/>
    <label class="fl">⏰ वापसी की तारीख</label><input class="fi" id="mdu" type="date" value="${f.dueDate||''}"/>
    <label class="fl">📝 नोट</label><input class="fi" id="mno" placeholder="कुछ जरूरी बात..." value="${f.note||''}"/>
    <button class="btn bp bfw" id="btn-su">✅ सेव करें</button>`;
  }
  else if(S.modal==='pocket'||S.modal==='income'){
    const isI=S.modal==='income'; title=isI?'💰 आमदनी जोड़ें':'💸 खर्च जोड़ें';
    const dir=f.dir||(isI?'in':'out');
    const cats=dir==='in'?['दुकान कमाई','उधार वापसी','मजदूरी','Registry/Document','अन्य आमदनी']:['खाना','यातायात','दुकान खर्च','मोबाइल','बिल','कपड़े','दवाई','मनोरंजन','अन्य'];
    body=`<div style="display:flex;gap:8px;margin-bottom:12px"><button class="dib" data-dir="in" style="flex:1;padding:10px 0;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;border:2px solid #16A34A;background:${dir==='in'?'#16A34A':'transparent'};color:${dir==='in'?'#fff':'#16A34A'}">💰 आमदनी</button><button class="dib" data-dir="out" style="flex:1;padding:10px 0;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;border:2px solid #DC2626;background:${dir==='out'?'#DC2626':'transparent'};color:${dir==='out'?'#fff':'#DC2626'}">💸 खर्च</button></div>
    <label class="fl">💰 रकम (₹) *</label><input class="fi" id="pa" type="number" placeholder="0" value="${f.amount||''}"/>
    <label class="fl">📂 श्रेणी</label><select class="fi" id="pc">${cats.map(c=>`<option>${c}</option>`).join('')}</select>
    <label class="fl">💳 माध्यम</label><select class="fi" id="pm"><option value="cash">नकद (Cash)</option><option value="online">ऑनलाइन (UPI)</option></select>
    <label class="fl">📅 तारीख</label><input class="fi" id="pda" type="date" value="${f.date||today()}"/>
    <label class="fl">📝 नोट</label><input class="fi" id="pno" placeholder="किसलिए?" value="${f.note||''}"/>
    <input type="hidden" id="pdir" value="${dir}"/>
    <button class="btn bp bfw" id="btn-sp">✅ सेव करें</button>`;
  }
  else if(S.modal==='settle'&&S.settleItem){
    const u=S.settleItem; const mode=f.sm||'full'; title='✅ चुकता करें';
    body=`<div style="background:#FFF8F0;border-radius:12px;padding:14px;margin-bottom:14px"><p style="font-weight:700;font-size:16px">${u.name}</p><p style="color:#78716C;margin-top:4px">${fmtAmt(u.amount)} • ${u.type==='lena'?'आपको मिलना था':'आपको देना था'}</p></div>
    <div style="display:flex;gap:8px;margin-bottom:12px"><button class="smb" data-mode="full" style="flex:1;padding:10px 0;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;border:2px solid #FF6B00;background:${mode==='full'?'#FF6B00':'transparent'};color:${mode==='full'?'#fff':'#FF6B00'}">पूरा चुकता</button><button class="smb" data-mode="partial" style="flex:1;padding:10px 0;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;border:2px solid #FF6B00;background:${mode==='partial'?'#FF6B00':'transparent'};color:${mode==='partial'?'#fff':'#FF6B00'}">आंशिक</button></div>
    ${mode==='partial'?`<label class="fl">कितना मिला/दिया? (₹)</label><input class="fi" id="sa" type="number" placeholder="0"/>`:''}
    <button class="btn bg bfw" id="btn-cs">✅ चुकता करें</button>`;
  }
  else if(S.modal==='registry'){
    const er=f.editReg||{}; title=er.id?'✏️ Document Edit':'📄 नया Document';
    body=`<label class="fl">👤 Client का नाम *</label><input class="fi" id="rc-name" placeholder="जैसे: श्री रामलाल वर्मा" value="${er.clientName||''}"/>
    <label class="fl">📱 Mobile</label><input class="fi" id="rc-mobile" type="tel" placeholder="Client का mobile" value="${er.clientMobile||''}"/>
    <label class="fl">🏠 पता</label><input class="fi" id="rc-addr" placeholder="Client का पता" value="${er.clientAddress||''}"/>
    <label class="fl">📝 Document प्रकार *</label>
    <select class="fi" id="rc-dtype"><option value="जमीन बिक्री पत्र">जमीन बिक्री पत्र (Sale Deed)</option><option value="मकान बिक्री पत्र">मकान बिक्री पत्र</option><option value="Gift Deed">Gift Deed (दान पत्र)</option><option value="Power of Attorney">Power of Attorney</option><option value="Agreement">Agreement / करार नामा</option><option value="Lease Deed">Lease Deed (पट्टा)</option><option value="Affidavit">Affidavit (शपथ पत्र)</option><option value="Will">Will (वसीयत)</option><option value="Partition Deed">Partition Deed (बंटवारा)</option><option value="Mortgage">Mortgage (बंधक)</option><option value="अन्य">अन्य</option></select>
    <label class="fl">📋 Property / Document विवरण</label><textarea class="fi" id="rc-desc" placeholder="खसरा नंबर, क्षेत्रफल, स्थान...">${er.propertyDesc||''}</textarea>
    <label class="fl">📅 तारीख *</label><input class="fi" id="rc-date" type="date" value="${er.docDate||today()}"/>
    <label class="fl">📌 Registration नंबर</label><input class="fi" id="rc-regnum" placeholder="Registry number" value="${er.regNumber||''}"/>
    <label class="fl" style="color:#16A34A;font-size:14px">💰 आमदनी और खर्चे</label>
    <label class="fl">💰 Client से लिया (₹) *</label><input class="fi" id="rc-charge" type="number" placeholder="0" value="${er.clientCharge||''}"/>
    <label class="fl">⌨️ Typing शुल्क (₹)</label><input class="fi" id="rc-typing" type="number" placeholder="0" value="${er.typingFee||''}"/>
    <label class="fl">🏛️ Registration शुल्क (₹)</label><input class="fi" id="rc-regfee" type="number" placeholder="0" value="${er.registrationFee||''}"/>
    <label class="fl">🧾 Challan (₹)</label><input class="fi" id="rc-challan" type="number" placeholder="0" value="${er.challanFee||''}"/>
    <label class="fl">💻 Data Entry (₹)</label><input class="fi" id="rc-data" type="number" placeholder="0" value="${er.dataEntryFee||''}"/>
    <label class="fl">📦 अन्य खर्च (₹)</label><input class="fi" id="rc-other" type="number" placeholder="0" value="${er.otherCost||''}"/>
    <label class="fl">📌 Status</label>
    <select class="fi" id="rc-status"><option value="pending" ${(er.status||'pending')==='pending'?'selected':''}>⏳ Pending</option><option value="registered" ${er.status==='registered'?'selected':''}>📋 Registered</option><option value="complete" ${er.status==='complete'?'selected':''}>✅ Complete</option></select>
    <label class="fl">📁 Final Copy</label>
    <select class="fi" id="rc-copy"><option value="0" ${!er.finalCopyGiven?'selected':''}>❌ नहीं दी</option><option value="1" ${er.finalCopyGiven?'selected':''}>✅ दे दी</option></select>
    <label class="fl">📝 नोट</label><textarea class="fi" id="rc-notes" placeholder="कोई और जानकारी...">${er.notes||''}</textarea>
    <button class="btn bblue bfw" id="btn-sreg">✅ Document Save करें</button>`;
  }
  else if(S.modal==='reminder'){
    title='🔔 नया रिमाइंडर';
    body=`<label class="fl">📝 किसलिए?</label><input class="fi" id="rn" placeholder="जैसे: बिजली बिल, Registry याद"/>
    <label class="fl">💰 रकम (वैकल्पिक)</label><input class="fi" id="ra" type="number" placeholder="0"/>
    <label class="fl">📅 तारीख</label><input class="fi" id="rd" type="date"/>
    <label class="fl">📝 नोट</label><input class="fi" id="rno" placeholder="कुछ जरूरी बात..."/>
    <button class="btn bp bfw" id="btn-arem">🔔 जोड़ें</button>`;
  }
  return `<div class="mov" id="mov"><div class="mbox"><div class="mhdr"><h3 style="font-family:Georgia,serif;font-size:19px">${title}</h3><button class="mcls" id="cm">✕</button></div>${body}</div></div>`;
}

function nav(){ return `<div class="bnav">${[['dashboard','🏠','होम'],['udhar','📒','उधार'],['pocket','👛','जेब'],['registry','📄','Registry'],['history','📜','इतिहास']].map(([t,ic,lb])=>`<button class="nb ${S.tab===t?'on':''}" data-tab="${t}"><span class="ni">${ic}</span>${lb}</button>`).join('')}</div>`; }

function attach(){
  document.querySelectorAll('.nb').forEach(b=>b.onclick=()=>{ S.tab=b.dataset.tab; mf={}; render(); });
  const lb=g('lock-btn'); if(lb) lb.onclick=()=>lockApp();
  const mov=g('mov'); if(mov) mov.onclick=e=>{ if(e.target===mov){S.modal=null;mf={};render();} };
  const cm=g('cm'); if(cm) cm.onclick=()=>{ S.modal=null;mf={};render(); };
  document.querySelectorAll('.qab').forEach(b=>b.onclick=()=>{ const a=b.dataset.a; S.modal=a; mf={dir:a==='income'?'in':'out'}; render(); });
  document.querySelectorAll('.dau-btn').forEach(b=>b.onclick=()=>{ S.modal='udhar';mf={};render(); });
  const sau=document.querySelector('.sau'); if(sau) sau.onclick=()=>{ S.tab='udhar';render(); };
  document.querySelectorAll('.aub-btn').forEach(b=>b.onclick=()=>{ S.modal='udhar';mf={};render(); });
  const us=g('us'); if(us) us.oninput=e=>{ S.udharSearch=e.target.value;render(); };
  document.querySelectorAll('.uf').forEach(b=>b.onclick=()=>{ S.udharFilter=b.dataset.val;render(); });
  document.querySelectorAll('.su-settle').forEach(b=>b.onclick=()=>{ const u=LS.udhars.find(x=>x.id==b.dataset.id); if(u){S.settleItem=u;S.modal='settle';mf={};render();} });
  document.querySelectorAll('.su-share').forEach(b=>b.onclick=()=>shareU(b.dataset.id));
  document.querySelectorAll('.apb-btn').forEach(b=>b.onclick=()=>{ S.modal='pocket';mf={dir:'out'};render(); });
  document.querySelectorAll('.aib-btn').forEach(b=>b.onclick=()=>{ S.modal='income';mf={dir:'in'};render(); });
  const pd=g('pd'); if(pd) pd.onchange=e=>{ S.pocketDate=e.target.value;render(); };
  document.querySelectorAll('.areg-btn').forEach(b=>b.onclick=()=>{ S.modal='registry';mf={};render(); });
  const rs=g('regsrch'); if(rs) rs.oninput=e=>{ S.regSearch=e.target.value;render(); };
  document.querySelectorAll('.rf').forEach(b=>b.onclick=()=>{ S.regFilter=b.dataset.val;render(); });
  document.querySelectorAll('.reg-edit').forEach(b=>b.onclick=()=>{ const r=LS.registry.find(x=>x.id==b.dataset.id); if(r){S.modal='registry';mf={editReg:r};render();} });
  document.querySelectorAll('.reg-share').forEach(b=>b.onclick=()=>shareReg(b.dataset.id));
  document.querySelectorAll('.reg-done').forEach(b=>b.onclick=async()=>{ const r=LS.registry.find(x=>x.id==b.dataset.id); if(!r) return; const upd={...r,status:'complete'}; const i=LS.registry.findIndex(x=>x.id===r.id); if(i>=0) LS.registry[i]=upd; lsSave('registry'); await dbSet('registry/'+r.id,upd); render(); toast('✅ Document पूर्ण!'); });
  document.querySelectorAll('.hf').forEach(b=>b.onclick=()=>{ S.historyType=b.dataset.val;render(); });
  document.querySelectorAll('.dib').forEach(b=>b.onclick=()=>{ mf.dir=b.dataset.dir;mf.category='';render(); });
  document.querySelectorAll('.smb').forEach(b=>b.onclick=()=>{ mf.sm=b.dataset.mode;render(); });

  // ── SAVE BUTTONS ──────────────────────
  const btnSU=g('btn-su');
  if(btnSU) btnSU.onclick=async()=>{
    const name=(g('mn')||{}).value?.trim()||'';
    const amount=Number((g('ma')||{}).value)||0;
    if(!name){ toast('⚠️ नाम भरें!'); return; }
    if(!amount){ toast('⚠️ रकम भरें!'); return; }
    btnSU.textContent='⏳ Save हो रहा है...'; btnSU.disabled=true;
    await saveUdhar({ id:uid(), name, amount, type:(g('mt')||{}).value||'lena', mode:(g('mm')||{}).value||'cash', service:(g('ms')||{}).value||'general', date:(g('md')||{}).value||today(), dueDate:(g('mdu')||{}).value||'', note:(g('mno')||{}).value?.trim()||'', settled:false });
  };

  const btnSP=g('btn-sp');
  if(btnSP) btnSP.onclick=async()=>{
    const amount=Number((g('pa')||{}).value)||0;
    if(!amount){ toast('⚠️ रकम भरें!'); return; }
    const dir=(g('pdir')||{}).value||'out';
    btnSP.textContent='⏳ Save हो रहा है...'; btnSP.disabled=true;
    await savePocket({ id:uid(), amount, dir, category:(g('pc')||{}).value||'अन्य', mode:(g('pm')||{}).value||'cash', date:(g('pda')||{}).value||today(), note:(g('pno')||{}).value?.trim()||'' });
  };

  const btnCS=g('btn-cs');
  if(btnCS) btnCS.onclick=async()=>{ const mode=mf.sm||'full'; if(mode==='partial'&&!Number((g('sa')||{}).value)){ toast('⚠️ रकम भरें!'); return; } btnCS.textContent='⏳...'; btnCS.disabled=true; await settleUdhar(S.settleItem.id); };

  const btnSR=g('btn-sreg');
  if(btnSR) btnSR.onclick=async()=>{
    const clientName=(g('rc-name')||{}).value?.trim()||'';
    const clientCharge=Number((g('rc-charge')||{}).value)||0;
    if(!clientName){ toast('⚠️ Client का नाम भरें!'); return; }
    if(!clientCharge){ toast('⚠️ Client से लिया amount भरें!'); return; }
    btnSR.textContent='⏳ Save हो रहा है...'; btnSR.disabled=true;
    const er=mf.editReg||{};
    await saveReg({ id:er.id||uid(), clientName, clientCharge, clientMobile:(g('rc-mobile')||{}).value?.trim()||'', clientAddress:(g('rc-addr')||{}).value?.trim()||'', docType:(g('rc-dtype')||{}).value||'अन्य', propertyDesc:(g('rc-desc')||{}).value?.trim()||'', docDate:(g('rc-date')||{}).value||today(), regNumber:(g('rc-regnum')||{}).value?.trim()||'', typingFee:Number((g('rc-typing')||{}).value)||0, registrationFee:Number((g('rc-regfee')||{}).value)||0, challanFee:Number((g('rc-challan')||{}).value)||0, dataEntryFee:Number((g('rc-data')||{}).value)||0, otherCost:Number((g('rc-other')||{}).value)||0, status:(g('rc-status')||{}).value||'pending', finalCopyGiven:(g('rc-copy')||{}).value==='1', notes:(g('rc-notes')||{}).value?.trim()||'' });
  };

  const btnArem=g('btn-arem');
  if(btnArem) btnArem.onclick=async()=>{ const name=(g('rn')||{}).value?.trim()||''; const dd=(g('rd')||{}).value||''; if(!name||!dd){ toast('⚠️ नाम और तारीख भरें!'); return; } await saveRem({id:uid(),name,amount:Number((g('ra')||{}).value)||0,dueDate:dd,note:(g('rno')||{}).value?.trim()||'',done:false}); };
}
</script>
</body>
</html>
