<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#FF6B00"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="मेरा हिसाब"/>
<title>मेरा हिसाब 🔒</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{background:#FFF8F0;font-family:'Noto Sans Devanagari','Segoe UI',sans-serif;color:#1C1917;overscroll-behavior:none}
button,input,select,textarea{font-family:'Noto Sans Devanagari','Segoe UI',sans-serif}
#splash{position:fixed;inset:0;background:linear-gradient(160deg,#FF6B00,#CC4400);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.sp-logo{font-size:64px;animation:pop .4s}
@keyframes pop{0%{transform:scale(.5)}100%{transform:scale(1)}}
.sp-title{color:#fff;font-size:30px;font-family:Georgia,serif}
.sp-sub{color:#FFE4C4;font-size:14px}
.spin{width:32px;height:32px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite;margin-top:16px}
@keyframes sp{to{transform:rotate(360deg)}}
#pin-screen{position:fixed;inset:0;background:linear-gradient(160deg,#FF6B00,#CC4400);z-index:998;display:none;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px}
.pin-logo{font-size:52px;margin-bottom:6px}
.pin-title{color:#fff;font-size:26px;font-family:Georgia,serif;margin-bottom:4px}
.pin-sub{color:#FFE4C4;font-size:13px;margin-bottom:32px;text-align:center;line-height:1.5}
.pin-dots{display:flex;gap:16px;margin-bottom:28px}
.dot{width:18px;height:18px;border-radius:50%;border:2px solid #FFE4C4;background:transparent;transition:.2s}
.dot.filled{background:#fff;border-color:#fff}
.dot.err{background:#FF6B6B;border-color:#FF6B6B;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px}
.key{background:rgba(255,255,255,.15);border:none;border-radius:16px;padding:18px 0;font-size:24px;font-weight:700;color:#fff;cursor:pointer}
.key:active{background:rgba(255,255,255,.35);transform:scale(.94)}
.key.zero{grid-column:2}
.key.del{background:rgba(255,100,100,.2);color:#FFD0D0}
.pin-err{color:#FFD0D0;font-size:13px;margin-top:10px;height:18px;text-align:center}
.pin-links{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap;justify-content:center}
.plink{color:#FFE4C4;font-size:12px;text-decoration:underline;cursor:pointer;background:none;border:none}
.sync-bar{font-size:11px;color:#FFE4C4;margin-top:5px;display:flex;align-items:center;gap:5px}
.sdot{width:7px;height:7px;border-radius:50%;background:#4ADE80;flex-shrink:0}
.sdot.ing{background:#FCD34D;animation:pulse .8s infinite}
.sdot.off{background:#F87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#app-wrap{display:none;max-width:480px;margin:0 auto;min-height:100vh}
.page{padding-bottom:80px;min-height:100vh}
.hdr{background:linear-gradient(135deg,#FF6B00,#CC5500);padding:28px 20px 18px;border-radius:0 0 28px 28px;margin-bottom:18px;position:relative}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start}
.hdr-btn{background:rgba(255,255,255,.2);border:none;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer;color:#fff}
.card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px #FF6B0015;border:1px solid #FFE4C4;margin-bottom:14px}
.card-g{background:linear-gradient(135deg,#16A34A,#15803D);color:#fff}
.card-blue{background:linear-gradient(135deg,#1D4ED8,#1E40AF);color:#fff}
.card-purple{background:linear-gradient(135deg,#7C3AED,#6D28D9);color:#fff}
.px{padding:0 16px}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1.5px solid #FFE4C4;display:flex;z-index:50}
.nb{flex:1;padding:8px 0;background:transparent;border:none;cursor:pointer;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:2px;color:#78716C}
.nb.on{color:#FF6B00;font-weight:700}
.ni{font-size:18px}
.mov{position:fixed;inset:0;background:#00000060;z-index:100;display:flex;align-items:flex-end;justify-content:center}
.mbox{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:24px;max-height:92vh;overflow-y:auto}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.mcls{background:#F5F5F5;border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:18px}
.fl{font-size:13px;color:#78716C;font-weight:600;display:block;margin-bottom:4px;margin-top:12px}
.fi{width:100%;border:1.5px solid #FFE4C4;border-radius:10px;padding:10px 12px;font-size:15px;color:#1C1917;background:#FFF8F0;outline:none}
.fi:focus{border-color:#FF6B00}
textarea.fi{resize:vertical;min-height:70px}
.btn{border-radius:12px;padding:10px 20px;font-weight:700;font-size:15px;cursor:pointer;border:none}
.bp{background:#FF6B00;color:#fff}
.bg{background:#16A34A;color:#fff}
.br{background:#DC2626;color:#fff}
.bblue{background:#1D4ED8;color:#fff}
.bfw{width:100%;margin-top:10px;display:block}
.bdg{padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.ftabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.ftab{padding:7px 14px;border-radius:20px;font-weight:700;font-size:13px;cursor:pointer;border:2px solid #FF6B00;background:transparent;color:#FF6B00}
.ftab.on{background:#FF6B00;color:#fff}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #FFE4C4}
.rmeta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;align-items:center}
.arow{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.sbtn{font-size:11px;background:#FF6B0020;color:#FF6B00;border:none;border-radius:8px;padding:3px 8px;cursor:pointer;font-weight:700}
.shbtn{font-size:11px;background:#0EA5E920;color:#0EA5E9;border:none;border-radius:8px;padding:3px 8px;cursor:pointer;font-weight:700}
.edit-btn{font-size:11px;background:#7C3AED20;color:#7C3AED;border:none;border-radius:8px;padding:3px 8px;cursor:pointer;font-weight:700}
.alr{background:#FEF2F2;border:1.5px solid #FECACA;border-radius:14px;padding:14px;margin-bottom:14px}
.si{width:100%;border:1.5px solid #FFE4C4;border-radius:10px;padding:10px 12px;font-size:14px;background:#FFF8F0;outline:none;margin-bottom:10px}
.empty{text-align:center;padding:40px;color:#78716C}
.sb{border-radius:12px;padding:12px}
.sg{background:#F0FDF4;border:1.5px solid #BBF7D0}
.sr{background:#FEF2F2;border:1.5px solid #FECACA}
.sbl{background:#EFF6FF;border:1.5px solid #BFDBFE}
.sp{background:#F5F3FF;border:1.5px solid #DDD6FE}
.sl{font-size:12px;color:#78716C}
.sv{font-weight:800;font-size:20px}
.ob{font-size:11px;background:#FEE2E2;color:#DC2626;padding:1px 6px;border-radius:8px}
.status-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1C1917;color:#fff;padding:12px 20px;border-radius:20px;font-size:13px;z-index:300;max-width:90vw;text-align:center;pointer-events:none}
/* Registry card */
.reg-card{background:#fff;border-radius:16px;padding:14px;box-shadow:0 2px 12px #1D4ED815;border:1px solid #BFDBFE;margin-bottom:12px}
.reg-title{font-weight:700;font-size:15px;color:#1E40AF;margin-bottom:6px}
.reg-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:3px 0;border-bottom:1px solid #F0F7FF}
.profit-pos{color:#16A34A;font-weight:800}
.profit-neg{color:#DC2626;font-weight:800}
</style>
</head>
<body>

<div id="splash">
  <div class="sp-logo">📒</div>
  <h2 class="sp-title">मेरा हिसाब</h2>
  <p class="sp-sub">आपका पैसा, आपका हिसाब</p>
  <div class="spin"></div>
</div>

<div id="pin-screen">
  <div class="pin-logo">📒</div>
  <h2 class="pin-title">मेरा हिसाब</h2>
  <p class="pin-sub" id="pin-msg">अपना PIN डालें</p>
  <div class="pin-dots">
    <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
  </div>
  <div class="keypad">
    <button class="key" data-k="1">1</button><button class="key" data-k="2">2</button><button class="key" data-k="3">3</button>
    <button class="key" data-k="4">4</button><button class="key" data-k="5">5</button><button class="key" data-k="6">6</button>
    <button class="key" data-k="7">7</button><button class="key" data-k="8">8</button><button class="key" data-k="9">9</button>
    <button class="key zero" data-k="0">0</button><button class="key del" id="del-btn">⌫</button>
  </div>
  <p class="pin-err" id="pin-err"></p>
  <div class="pin-links">
    <button class="plink" id="change-pin-btn">🔑 PIN बदलें</button>
    <button class="plink" id="reset-btn">⚠️ Reset</button>
  </div>
</div>

<div id="app-wrap">
  <div id="app"></div>
</div>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged }
                           from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, onValue, off }
                           from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ══════════════════════════════════════
// 🔧 APNA CONFIG YAHAN DAALO
// ══════════════════════════════════════
const FC = {
  apiKey:            "APNA_API_KEY",
  authDomain:        "APNA_PROJECT.firebaseapp.com",
  projectId:         "APNA_PROJECT_ID",
  storageBucket:     "APNA_PROJECT.appspot.com",
  messagingSenderId: "APNA_SENDER_ID",
  appId:             "APNA_APP_ID",
  databaseURL:       "https://APNA_PROJECT_ID-default-rtdb.firebaseio.com"
};
// ══════════════════════════════════════

let fbOk = false, fbUID = '', db, auth;

// Try Firebase, fallback to localStorage if config not set
try {
  if (!FC.apiKey.includes('APNA')) {
    const fapp = initializeApp(FC);
    auth = getAuth(fapp);
    db   = getDatabase(fapp);
    fbOk = true;
  }
} catch(e) { fbOk = false; }

// ── Helpers ───────────────────────────
const today = () => new Date().toISOString().split('T')[0];
const uid   = () => Date.now()+'_'+Math.random().toString(36).slice(2,6);
const fmtDate = d => { try{ return new Date(d).toLocaleDateString('hi-IN',{day:'2-digit',month:'short',year:'numeric'}); }catch(e){ return d||''; } };
const fmtAmt  = n => '₹'+Math.abs(Number(n)||0).toLocaleString('en-IN');
const bdg     = (c,t) => `<span class="bdg" style="background:${c}20;color:${c}">${t}</span>`;
const toast   = m => { const t=document.createElement('div'); t.className='toast'; t.textContent=m; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); };
const v       = id => document.getElementById(id);
const gv      = id => { const el=v(id); return el ? el.value.trim() : ''; };
const gn      = id => { const el=v(id); return Number(el ? el.value : 0)||0; };

// ── Data storage (Firebase + localStorage fallback) ──
let LS = {
  udhars:[], pocket:[], reminders:[], registry:[]
};

function lsLoad() {
  try {
    ['udhars','pocket','reminders','registry'].forEach(k=>{
      const d=localStorage.getItem('mh_'+k);
      if(d) LS[k]=JSON.parse(d);
    });
  } catch(e) {}
}

function lsSave(key) {
  try { localStorage.setItem('mh_'+key, JSON.stringify(LS[key])); } catch(e) {}
}

let syncSt = 'local';
let listeners = [];

function refreshSyncDot() {
  const d=v('sdot'), t=v('stxt');
  if(!d||!t) return;
  if (syncSt==='cloud') { d.className='sdot'; t.textContent='☁️ Cloud में Save है'; }
  else if (syncSt==='syncing') { d.className='sdot ing'; t.textContent='💾 Save हो रहा है...'; }
  else if (syncSt==='offline') { d.className='sdot off'; t.textContent='📴 Offline — Phone में Save'; }
  else { d.className='sdot'; d.style.background='#60A5FA'; t.textContent='📱 Phone में Save है'; }
}

async function dbSet(path, data) {
  // Always save to localStorage first
  lsSave(path.split('/')[0]);
  refreshSyncDot();
  if (!fbOk || !fbUID) return;
  syncSt = 'syncing'; refreshSyncDot();
  try {
    await set(ref(db, `users/${fbUID}/${path}`), data);
    syncSt = 'cloud'; refreshSyncDot();
  } catch(e) {
    syncSt = 'offline'; refreshSyncDot();
  }
}

function startFirebaseListeners() {
  if (!fbOk || !fbUID) { lsLoad(); unlockApp(); return; }
  listeners.forEach(({r,fn})=>off(r,fn));
  listeners = [];
  let loaded = 0;
  ['udhars','pocket','reminders','registry'].forEach(key => {
    const r = ref(db, `users/${fbUID}/${key}`);
    const fn = onValue(r, snap => {
      const val = snap.val();
      LS[key] = val ? Object.values(val).sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||'')) : [];
      lsSave(key);
      loaded++;
      if (loaded >= 4) unlockApp();
      else if (document.getElementById('app-wrap').style.display !== 'none') render();
    }, () => {
      syncSt = 'offline';
      lsLoad();
      unlockApp();
    });
    listeners.push({r,fn});
  });
  // Timeout fallback
  setTimeout(() => { if (document.getElementById('app-wrap').style.display === 'none') { lsLoad(); unlockApp(); } }, 4000);
}

// ── Auth ───────────────────────────────
function initApp() {
  document.getElementById('splash').style.display = 'none';
  if (fbOk) {
    onAuthStateChanged(auth, async user => {
      if (user) {
        fbUID = user.uid;
        localStorage.setItem('mh_uid', fbUID);
        syncSt = 'syncing';
        startFirebaseListeners();
      } else {
        try {
          await signInAnonymously(auth);
        } catch(e) {
          fbUID = localStorage.getItem('mh_uid') || 'local_'+Date.now();
          localStorage.setItem('mh_uid', fbUID);
          lsLoad();
          unlockApp();
        }
      }
    });
  } else {
    // No Firebase config — use localStorage only
    lsLoad();
    syncSt = 'local';
    showPin();
  }
}

window.addEventListener('load', () => setTimeout(initApp, 800));

// ── PIN System ─────────────────────────
let pinBuf='', pinMode='enter', pinTemp='';
const PIN_KEY = 'mh_pin';

function showPin() {
  const saved = localStorage.getItem(PIN_KEY);
  if (!saved) {
    pinMode = 'setup1';
    v('pin-msg').textContent = '🔐 नया 4 अंक PIN बनाएं';
    v('change-pin-btn').style.display = 'none';
  } else {
    pinMode = 'enter';
    v('pin-msg').textContent = 'PIN डालें और अंदर आएं 👇';
    v('change-pin-btn').style.display = '';
  }
  pinBuf = ''; updateDots();
  v('pin-screen').style.display = 'flex';
  v('app-wrap').style.display = 'none';
}

function updateDots() {
  for(let i=0;i<4;i++){
    v('d'+i).classList.toggle('filled', i<pinBuf.length);
    v('d'+i).classList.remove('err');
  }
}

function shakeErr(msg) {
  for(let i=0;i<4;i++) v('d'+i).classList.add('err');
  v('pin-err').textContent = msg;
  setTimeout(()=>{ pinBuf=''; updateDots(); v('pin-err').textContent=''; }, 900);
}

function processPin() {
  if (pinMode==='setup1') {
    pinTemp=pinBuf; pinBuf=''; updateDots(); pinMode='setup2';
    v('pin-msg').textContent = '✅ PIN फिर से डालें (confirm)';
    v('pin-err').textContent = '';
  } else if (pinMode==='setup2') {
    if (pinBuf===pinTemp) {
      localStorage.setItem(PIN_KEY, btoa(pinBuf));
      unlockApp();
    } else {
      shakeErr('❌ PIN मेल नहीं खाया'); pinMode='setup1'; pinTemp='';
      setTimeout(()=>{ v('pin-msg').textContent='🔐 नया 4 अंक PIN बनाएं'; }, 900);
    }
  } else {
    try {
      const saved = atob(localStorage.getItem(PIN_KEY)||'');
      if (pinBuf===saved) unlockApp(); else shakeErr('❌ गलत PIN! फिर कोशिश करें');
    } catch(e) { shakeErr('❌ गलत PIN'); }
  }
}

function unlockApp() {
  v('pin-screen').style.display = 'none';
  v('app-wrap').style.display = 'block';
  render();
}

function lockApp() {
  pinBuf=''; updateDots(); v('pin-err').textContent='';
  const saved=localStorage.getItem(PIN_KEY);
  if(saved){ pinMode='enter'; v('pin-msg').textContent='PIN डालें'; v('change-pin-btn').style.display=''; }
  v('app-wrap').style.display='none';
  v('pin-screen').style.display='flex';
}

document.querySelectorAll('.key').forEach(b=>b.addEventListener('click',()=>{
  if(!b.dataset.k) return;
  if(pinBuf.length<4){ pinBuf+=b.dataset.k; updateDots(); if(pinBuf.length===4) setTimeout(processPin,150); }
}));
v('del-btn').addEventListener('click',()=>{ if(pinBuf.length>0){pinBuf=pinBuf.slice(0,-1);updateDots();} });
v('change-pin-btn').addEventListener('click',()=>{ if(confirm('PIN बदलें?')){ localStorage.removeItem(PIN_KEY); pinMode='setup1'; pinBuf=''; updateDots(); v('pin-msg').textContent='🔐 नया PIN बनाएं'; v('change-pin-btn').style.display='none'; }});
v('reset-btn').addEventListener('click',()=>{ if(confirm('⚠️ सारा DATA मिट जाएगा!\nक्या sure हैं?')){ if(confirm('Last chance! सब मिटाओ?')){ localStorage.clear(); location.reload(); }}});

// ── State ──────────────────────────────
let S = {
  tab:'dashboard', modal:null, settleItem:null, regItem:null,
  udharFilter:'active', udharSearch:'', historyType:'all',
  pocketDate:today(), regFilter:'all', regSearch:''
};
let mf = {};

// ── CRUD ───────────────────────────────
async function saveUdhar(e) {
  e.createdAt = e.date||today();
  const idx = LS.udhars.findIndex(x=>x.id===e.id);
  if(idx>=0) LS.udhars[idx]=e; else LS.udhars.unshift(e);
  lsSave('udhars');
  await dbSet(`udhars/${e.id}`, e);
  if(e.dueDate && idx<0){
    const r={id:uid(),udhaarId:e.id,name:e.name,amount:e.amount,dueDate:e.dueDate,done:false,createdAt:today()};
    LS.reminders.push(r); lsSave('reminders');
    await dbSet(`reminders/${r.id}`, r);
  }
  S.modal=null; mf={}; render();
  toast('✅ उधार save हो गया!');
}

async function settleUdhar(id) {
  const u=LS.udhars.find(x=>x.id===id); if(!u) return;
  const upd={...u,settled:true,settledDate:today()};
  const idx=LS.udhars.findIndex(x=>x.id===id);
  if(idx>=0) LS.udhars[idx]=upd;
  lsSave('udhars');
  await dbSet(`udhars/${id}`,upd);
  const rems=LS.reminders.filter(x=>x.udhaarId===id);
  for(const r of rems){
    const ri=LS.reminders.findIndex(x=>x.id===r.id);
    if(ri>=0) LS.reminders[ri]={...r,done:true};
    await dbSet(`reminders/${r.id}`,{...r,done:true});
  }
  lsSave('reminders');
  S.modal=null; S.settleItem=null; mf={}; render();
  toast('✅ चुकता हो गया!');
}

async function savePocket(e) {
  e.createdAt = e.date;
  const idx=LS.pocket.findIndex(x=>x.id===e.id);
  if(idx>=0) LS.pocket[idx]=e; else LS.pocket.unshift(e);
  lsSave('pocket');
  await dbSet(`pocket/${e.id}`,e);
  S.modal=null; mf={}; render();
  toast('✅ Save हो गया!');
}

async function saveRem(r) {
  r.createdAt=today();
  LS.reminders.push(r); lsSave('reminders');
  await dbSet(`reminders/${r.id}`,r);
  render(); toast('✅ रिमाइंडर जुड़ गया!');
}

async function doneRem(id) {
  const ri=LS.reminders.findIndex(x=>x.id===id);
  if(ri>=0){ LS.reminders[ri]={...LS.reminders[ri],done:true}; lsSave('reminders'); await dbSet(`reminders/${id}`,LS.reminders[ri]); }
  render();
}

async function saveReg(e) {
  e.createdAt = e.docDate||today();
  // Calculate profit
  e.totalCost = (Number(e.typingFee)||0)+(Number(e.registrationFee)||0)+(Number(e.challanFee)||0)+(Number(e.dataEntryFee)||0)+(Number(e.otherCost)||0);
  e.profit = (Number(e.clientCharge)||0) - e.totalCost;
  const idx=LS.registry.findIndex(x=>x.id===e.id);
  if(idx>=0) LS.registry[idx]=e; else LS.registry.unshift(e);
  lsSave('registry');
  await dbSet(`registry/${e.id}`,e);
  S.modal=null; mf={}; render();
  toast('✅ Document record save हो गया!');
}

// ── Share ──────────────────────────────
function shareU(id) {
  const u=LS.udhars.find(x=>x.id==id); if(!u) return;
  const msg=`📒 *मेरा हिसाब — उधार रसीद*\n\n👤 नाम: ${u.name}\n💰 रकम: ${fmtAmt(u.amount)}\n📋 ${u.type==='lena'?'आपने मुझसे उधार लिया है':'मैंने आपसे उधार लिया है'}\n💳 ${u.mode==='cash'?'नकद (Cash)':'ऑनलाइन (UPI)'}\n${u.service&&u.service!=='general'?'📱 '+u.service+'\n':''}📅 ${fmtDate(u.createdAt)}\n${u.dueDate?'⏰ वापसी: '+fmtDate(u.dueDate)+'\n':''}\n${u.settled?'✅ चुकता हो गया':'⏳ अभी बकाया है'}${u.note?'\n📝 '+u.note:''}`;
  if(navigator.share) navigator.share({title:'उधार — '+u.name,text:msg}).catch(()=>copyTxt(msg));

}

function shareReg(id) {
  const r=LS.registry.find(x=>x.id==id); if(!r) return;
  const msg=`📄 *Document Record*\n\n👤 Client: ${r.clientName}\n📝 Document: ${r.docType}\n📅 तारीख: ${fmtDate(r.docDate)}\n\n💰 Client से लिया: ${fmtAmt(r.clientCharge)}\n\n🧾 खर्चे:\n• Typing: ${fmtAmt(r.typingFee)}\n• Registration: ${fmtAmt(r.registrationFee)}\n• Challan: ${fmtAmt(r.challanFee)}\n• Data Entry: ${fmtAmt(r.dataEntryFee)}\n• अन्य: ${fmtAmt(r.otherCost)}\n\n💵 कुल खर्च: ${fmtAmt(r.totalCost)}\n${r.profit>=0?'📈 मुनाफा':'📉 घाटा'}: ${fmtAmt(r.profit)}\n\n📌 Status: ${r.status==='complete'?'✅ पूर्ण':r.status==='registered'?'📋 Registered':'⏳ प्रक्रिया में'}`;
  if(navigator.share) navigator.share({title:'Document — '+r.clientName,text:msg}).catch(()=>copyTxt(msg));
  else copyTxt(msg);
}

function copyTxt(t) { try{navigator.clipboard.writeText(t).then(()=>toast('📋 Copy हो गया!'));}catch(e){const a=document.createElement('textarea');a.value=t;a.style.cssText='position:fixed;opacity:0';document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);toast('📋 Copy हो गया!');} }

// ── Computed ───────────────────────────
const aU   = () => LS.udhars.filter(u=>!u.settled);
const lena  = () => aU().filter(u=>u.type==='lena').reduce((s,u)=>s+Number(u.amount),0);
const dena  = () => aU().filter(u=>u.type==='dena').reduce((s,u)=>s+Number(u.amount),0);
const aIn   = () => LS.pocket.filter(t=>t.dir==='in').reduce((s,t)=>s+Number(t.amount),0);
const aOut  = () => LS.pocket.filter(t=>t.dir==='out').reduce((s,t)=>s+Number(t.amount),0);
const bal   = () => aIn()-aOut();
const tIn   = () => LS.pocket.filter(t=>t.date===today()&&t.dir==='in').reduce((s,t)=>s+Number(t.amount),0);
const tOut  = () => LS.pocket.filter(t=>t.date===today()&&t.dir==='out').reduce((s,t)=>s+Number(t.amount),0);
const ovU   = () => aU().filter(u=>u.dueDate&&u.dueDate<today());

      }
      const ig=t._t==='udhar'?t.type==='lena':t.dir==='in';
      return `<div class="row"><div><div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap"><span style="font-weight:700">${t._t==='udhar'?t.name:t.category}</span>${bdg(t._t==='udhar'?'#FF6B00':'#D97706',t._t==='udhar'?'उधार':'खर्च')}${t.settled?bdg('#16A34A','✅'):''}</div><div class="rmeta">${bdg(t.mode==='cash'?'#16A34A':'#0EA5E9',t.mode==='cash'?'💵':'📱')}<span style="font-size:12px;color:#78716C">${fmtDate(t.createdAt||t.date)}</span></div></div><p style="font-weight:800;font-size:17px;color:${ig?'#16A34A':'#DC2626'}">${fmtAmt(t.amount)}</p></div>`;
    }).join('')}
  </div>`;
}

// ── Modal ───────────────────────────────
function buildModal() {
  if (!S.modal) return '';
  let title='', body='';
  const f=mf;

  if (S.modal==='udhar') {
    title='📒 नया उधार जोड़ें';
    body=`
      <label class="fl">👤 व्यक्ति का नाम *</label><input class="fi" id="mn" placeholder="जैसे: राम भाऊ, सुरेश जी" value="${f.name||''}"/>
      <label class="fl">💰 रकम (₹) *</label><input class="fi" id="ma" type="number" placeholder="0" value="${f.amount||''}"/>
      <label class="fl">📋 प्रकार</label><select class="fi" id="mt"><option value="lena" ${(f.type||'lena')==='lena'?'selected':''}>मुझे लेना है (उन्होंने उधार लिया)</option><option value="dena" ${f.type==='dena'?'selected':''}>मुझे देना है (मैंने उधार लिया)</option></select>
      <label class="fl">💳 माध्यम</label><select class="fi" id="mm"><option value="cash">नकद (Cash)</option><option value="online">ऑनलाइन (UPI)</option></select>
      <label class="fl">📱 सेवा</label><select class="fi" id="ms"><option value="general">सामान्य</option><option value="jio">Jio</option><option value="airtel">Airtel</option><option value="vi">Vi</option><option value="bsnl">BSNL</option><option value="other">अन्य</option></select>
      <label class="fl">📅 तारीख</label><input class="fi" id="md" type="date" value="${f.date||today()}"/>
      <label class="fl">⏰ वापसी की तारीख</label><input class="fi" id="mdu" type="date" value="${f.dueDate||''}"/>
      <label class="fl">📝 नोट</label><input class="fi" id="mno" placeholder="कुछ जरूरी बात..." value="${f.note||''}"/>
      <button class="btn bp bfw" id="btn-su">✅ सेव करें</button>`;
  }

  else if (S.modal==='pocket' || S.modal==='income') {
    const isI=S.modal==='income';
    title=isI?'💰 आमदनी जोड़ें':'💸 खर्च जोड़ें';
    const dir=f.dir||(isI?'in':'out');
    const cats=dir==='in'?['दुकान कमाई','उधार वापसी','मजदूरी','Registry/Document','अन्य आमदनी']:['खाना','यातायात','दुकान खर्च','मोबाइल','बिल','कपड़े','दवाई','मनोरंजन','अन्य'];
    body=`
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="dib" data-dir="in" style="flex:1;padding:10px 0;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;border:2px solid #16A34A;background:${dir==='in'?'#16A34A':'transparent'};color:${dir==='in'?'#fff':'#16A34A'}">💰 आमदनी</button>
        <button class="dib" data-dir="out" style="flex:1;padding:10px 0;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;border:2px solid #DC2626;background:${dir==='out'?'#DC2626':'transparent'};color:${dir==='out'?'#fff':'#DC2626'}">💸 खर्च</button>
      </div>
      <label class="fl">💰 रकम (₹) *</label><input class="fi" id="pa" type="number" placeholder="0" value="${f.amount||''}"/>
      <label class="fl">📂 श्रेणी</label><select class="fi" id="pc">${cats.map(c=>`<option>${c}</option>`).join('')}</select>
      <label class="fl">💳 माध्यम</label><select class="fi" id="pm"><option value="cash">नकद (Cash)</option><option value="online">ऑनलाइन (UPI)</option></select>
      <label class="fl">📅 तारीख</label><input class="fi" id="pda" type="date" value="${f.date||today()}"/>
      <label class="fl">📝 नोट</label><input class="fi" id="pno" placeholder="किसलिए?" value="${f.note||''}"/>
      <input type="hidden" id="pdir" value="${dir}"/>
      <button class="btn bp bfw" id="btn-sp">✅ सेव करें</button>`;
  }

  else if (S.modal==='settle' && S.settleItem) {
    const u=S.settleItem; const mode=f.sm||'full'; title='✅ चुकता करें';
    body=`
      <div style="background:#FFF8F0;border-radius:12px;padding:14px;margin-bottom:14px"><p style="font-weight:700;font-size:16px">${u.name}</p><p style="color:#78716C;margin-top:4px">${fmtAmt(u.amount)} • ${u.type==='lena'?'आपको मिलना था':'आपको देना था'}</p></div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="smb" data-mode="full" style="flex:1;padding:10px 0;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;border:2px solid #FF6B00;background:${mode==='full'?'#FF6B00':'transparent'};color:${mode==='full'?'#fff':'#FF6B00'}">पूरा चुकता</button>
        <button class="smb" data-mode="partial" style="flex:1;padding:10px 0;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;border:2px solid #FF6B00;background:${mode==='partial'?'#FF6B00':'transparent'};color:${mode==='partial'?'#fff':'#FF6B00'}">आंशिक</button>
      </div>
      ${mode==='partial'?`<label class="fl">कितना मिला/दिया? (₹)</label><input class="fi" id="sa" type="number" placeholder="0"/>`:''}
      <button class="btn bg bfw" id="btn-cs">✅ चुकता करें</button>`;
  }

  else if (S.modal==='registry') {
    const er=f.editReg||{};
    title=er.id?'✏️ Document Edit करें':'📄 नया Document जोड़ें';
    body=`
      <div style="background:#EFF6FF;border-radius:12px;padding:12px;margin-bottom:14px">
        <p style="font-weight:700;color:#1D4ED8;margin-bottom:2px">👤 Client की जानकारी</p>
      </div>
      <label class="fl">👤 Client का नाम *</label><input class="fi" id="rc-name" placeholder="जैसे: श्री रामलाल वर्मा" value="${er.clientName||''}"/>
      <label class="fl">📱 Mobile नंबर</label><input class="fi" id="rc-mobile" type="tel" placeholder="Client का mobile" value="${er.clientMobile||''}"/>
      <label class="fl">🏠 पता</label><input class="fi" id="rc-addr" placeholder="Client का पता" value="${er.clientAddress||''}"/>

      <div style="background:#EFF6FF;border-radius:12px;padding:12px;margin:14px 0 6px">
        <p style="font-weight:700;color:#1D4ED8;margin-bottom:2px">📄 Document की जानकारी</p>
      </div>
      <label class="fl">📝 Document का प्रकार *</label>
      <select class="fi" id="rc-dtype">
        <option value="जमीन बिक्री पत्र" ${er.docType==='जमीन बिक्री पत्र'?'selected':''}>जमीन बिक्री पत्र (Sale Deed)</option>
        <option value="मकान बिक्री पत्र" ${er.docType==='मकान बिक्री पत्र'?'selected':''}>मकान बिक्री पत्र</option>
        <option value="Gift Deed" ${er.docType==='Gift Deed'?'selected':''}>Gift Deed (दान पत्र)</option>
        <option value="Power of Attorney" ${er.docType==='Power of Attorney'?'selected':''}>Power of Attorney</option>
        <option value="Agreement" ${er.docType==='Agreement'?'selected':''}>Agreement / करार नामा</option>
        <option value="Lease Deed" ${er.docType==='Lease Deed'?'selected':''}>Lease Deed (पट्टा)</option>
        <option value="Affidavit" ${er.docType==='Affidavit'?'selected':''}>Affidavit (शपथ पत्र)</option>
        <option value="Will" ${er.docType==='Will'?'selected':''}>Will (वसीयत)</option>
        <option value="Partition Deed" ${er.docType==='Partition Deed'?'selected':''}>Partition Deed (बंटवारा)</option>
        <option value="Mortgage" ${er.docType==='Mortgage'?'selected':''}>Mortgage (बंधक)</option>
        <option value="अन्य" ${er.docType==='अन्य'?'selected':''}>अन्य</option>
      </select>
      <label class="fl">📋 Property / Document विवरण</label>
      <textarea class="fi" id="rc-desc" placeholder="जमीन का खसरा नंबर, क्षेत्रफल, स्थान, आदि...">${er.propertyDesc||''}</textarea>
      <label class="fl">📅 Document की तारीख *</label><input class="fi" id="rc-date" type="date" value="${er.docDate||today()}"/>
      <label class="fl">📌 Registration नंबर</label><input class="fi" id="rc-regnum" placeholder="Registry number (यदि मिल गया)" value="${er.regNumber||''}"/>

      <div style="background:#EFF6FF;border-radius:12px;padding:12px;margin:14px 0 6px">
        <p style="font-weight:700;color:#1D4ED8;margin-bottom:2px">💰 खर्चे और आमदनी</p>
      </div>
      <label class="fl">💰 Client से लिया (₹) *</label><input class="fi" id="rc-charge" type="number" placeholder="0" value="${er.clientCharge||''}"/>
      <label class="fl">⌨️ Typing शुल्क (₹)</label><input class="fi" id="rc-typing" type="number" placeholder="0" value="${er.typingFee||''}"/>
      <label class="fl">🏛️ Registration शुल्क (₹)</label><input class="fi" id="rc-regfee" type="number" placeholder="0" value="${er.registrationFee||''}"/>
      <label class="fl">🧾 Challan शुल्क (₹)</label><input class="fi" id="rc-challan" type="number" placeholder="0" value="${er.challanFee||''}"/>
      <label class="fl">💻 Data Entry शुल्क (₹)</label><input class="fi" id="rc-data" type="number" placeholder="0" value="${er.dataEntryFee||''}"/>
      <label class="fl">📦 अन्य खर्च (₹)</label><input class="fi" id="rc-other" type="number" placeholder="0" value="${er.otherCost||''}"/>

      <div style="background:#EFF6FF;border-radius:12px;padding:12px;margin:14px 0 6px">
        <p style="font-weight:700;color:#1D4ED8;margin-bottom:2px">📌 Status</p>
      </div>
      <label class="fl">📌 Document Status</label>
      <select class="fi" id="rc-status">
        <option value="pending" ${(er.status||'pending')==='pending'?'selected':''}>⏳ Pending (प्रक्रिया में)</option>
        <option value="registered" ${er.status==='registered'?'selected':''}>📋 Registered (Register हो गया)</option>
        <option value="complete" ${er.status==='complete'?'selected':''}>✅ Complete (पूरी तरह पूर्ण)</option>
      </select>
      <label class="fl">📁 Final Copy</label>
      <select class="fi" id="rc-copy">
        <option value="0" ${!er.finalCopyGiven?'selected':''}>❌ Final Copy नहीं दी</option>
        <option value="1" ${er.finalCopyGiven?'selected':''}>✅ Final Copy दे दी</option>
      </select>
      <label class="fl">📝 अतिरिक्त नोट</label>
      <textarea class="fi" id="rc-notes" placeholder="कोई और जानकारी...">${er.notes||''}</textarea>
      <button class="btn bblue bfw" id="btn-sreg">✅ Document Save करें</button>`;
  }

  else if (S.modal==='reminder') {
    title='🔔 नया रिमाइंडर';
    body=`
      <label class="fl">📝 किसलिए?</label><input class="fi" id="rn" placeholder="जैसे: बिजली बिल, Registry याद"/>
      <label class="fl">💰 रकम (वैकल्पिक)</label><input class="fi" id="ra" type="number" placeholder="0"/>
      <label class="fl">📅 तारीख</label><input class="fi" id="rd" type="date"/>
      <label class="fl">📝 नोट</label><input class="fi" id="rno" placeholder="कुछ जरूरी बात..."/>
      <button class="btn bp bfw" id="btn-arem">🔔 जोड़ें</button>`;
  }

  return `<div class="mov" id="mov"><div class="mbox"><div class="mhdr"><h3 style="font-family:Georgia,serif;font-size:19px">${title}</h3><button class="mcls" id="cm">✕</button></div>${body}</div></div>`;
}

// ── Nav ─────────────────────────────────
function nav() {
  return `<div class="bnav">
    ${[['dashboard','🏠','होम'],['udhar','📒','उधार'],['pocket','👛','जेब'],['registry','📄','Registry'],['history','📜','इतिहास']]
      .map(([t,ic,lb])=>`<button class="nb ${S.tab===t?'on':''}" data-tab="${t}"><span class="ni">${ic}</span>${lb}</button>`).join('')}
  </div>`;
}

// ── Events ──────────────────────────────
function attach() {
  // Nav
  document.querySelectorAll('.nb').forEach(b=>b.onclick=()=>{ S.tab=b.dataset.tab; mf={}; render(); });

  // Lock
  const lb=v('lock-btn'); if(lb) lb.onclick=()=>lockApp();

  // Modal close
  const mov=v('mov'); if(mov) mov.onclick=e=>{ if(e.target===mov){S.modal=null;mf={};render();} };
  const cm=v('cm'); if(cm) cm.onclick=()=>{ S.modal=null;mf={};render(); };

  // Quick actions
  document.querySelectorAll('.qab').forEach(b=>b.onclick=()=>{
    const a=b.dataset.a;
    if(a==='reminders'){ S.modal='reminder'; mf={}; render(); }
    else if(a==='registry'){ S.modal='registry'; mf={}; render(); }
    else { S.modal=a; mf={dir:a==='income'?'in':'out'}; render(); }
  });

  // Dashboard add buttons
  document.querySelectorAll('.dau-btn').forEach(b=>b.onclick=()=>{ S.modal='udhar'; mf={}; render(); });
  const sau=document.querySelector('.sau'); if(sau) sau.onclick=()=>{ S.tab='udhar'; render(); };

  // Udhar page
  document.querySelectorAll('.aub-btn').forEach(b=>b.onclick=()=>{ S.modal='udhar'; mf={}; render(); });
  const us=v('us'); if(us) us.oninput=e=>{ S.udharSearch=e.target.value; render(); };
  document.querySelectorAll('.uf').forEach(b=>b.onclick=()=>{ S.udharFilter=b.dataset.val; render(); });
  document.querySelectorAll('.su-settle').forEach(b=>b.onclick=()=>{ const u=LS.udhars.find(x=>x.id==b.dataset.id); if(u){S.settleItem=u;S.modal='settle';mf={};render();} });
  document.querySelectorAll('.su-share').forEach(b=>b.onclick=()=>shareU(b.dataset.id));

  // Pocket page
  document.querySelectorAll('.apb-btn').forEach(b=>b.onclick=()=>{ S.modal='pocket'; mf={dir:'out'}; render(); });
  document.querySelectorAll('.aib-btn').forEach(b=>b.onclick=()=>{ S.modal='income'; mf={dir:'in'}; render(); });
  const pd=v('pd'); if(pd) pd.onchange=e=>{ S.pocketDate=e.target.value; render(); };

  // Registry page
  document.querySelectorAll('.areg-btn').forEach(b=>b.onclick=()=>{ S.modal='registry'; mf={}; render(); });
  const rs=v('regsrch'); if(rs) rs.oninput=e=>{ S.regSearch=e.target.value; render(); };
  document.querySelectorAll('.rf').forEach(b=>b.onclick=()=>{ S.regFilter=b.dataset.val; render(); });
  document.querySelectorAll('.reg-edit').forEach(b=>b.onclick=()=>{ const r=LS.registry.find(x=>x.id==b.dataset.id); if(r){S.modal='registry';mf={editReg:r};render();} });
  document.querySelectorAll('.reg-share').forEach(b=>b.onclick=()=>shareReg(b.dataset.id));
  document.querySelectorAll('.reg-complete').forEach(b=>b.onclick=async()=>{
    const r=LS.registry.find(x=>x.id==b.dataset.id); if(!r) return;
    const upd={...r,status:'complete'};
    const idx=LS.registry.findIndex(x=>x.id===r.id);
    if(idx>=0) LS.registry[idx]=upd; lsSave('registry');
    await dbSet(`registry/${r.id}`,upd); render(); toast('✅ Document पूर्ण हो गया!');
  });

  // History filters
  document.querySelectorAll('.hf').forEach(b=>b.onclick=()=>{ S.historyType=b.dataset.val; render(); });

  // Modal: dir toggle
  document.querySelectorAll('.dib').forEach(b=>b.onclick=()=>{ mf.dir=b.dataset.dir; mf.category=''; render(); });

  // Modal: settle mode
  document.querySelectorAll('.smb').forEach(b=>b.onclick=()=>{ mf.sm=b.dataset.mode; render(); });

  // ── SAVE BUTTONS ──
  // Save Udhar
  const btnSU=v('btn-su');
  if(btnSU) btnSU.onclick=async()=>{
    const name=(v('mn')||{}).value?.trim()||'';
    const amount=Number((v('ma')||{}).value)||0;
    if(!name){ toast('⚠️ नाम भरें!'); return; }
    if(!amount){ toast('⚠️ रकम भरें!'); return; }
    btnSU.textContent='⏳ Save हो रहा है...'; btnSU.disabled=true;
    try {
      await saveUdhar({
        id:uid(), name, amount,
        type:(v('mt')||{}).value||'lena',
        mode:(v('mm')||{}).value||'cash',
        service:(v('ms')||{}).value||'general',
        date:(v('md')||{}).value||today(),
        dueDate:(v('mdu')||{}).value||'',
        note:(v('mno')||{}).value?.trim()||'',
        settled:false
      });
    } catch(e){ toast('Error: '+e.message); btnSU.textContent='✅ सेव करें'; btnSU.disabled=false; }
  };

  // Save Pocket
  const btnSP=v('btn-sp');
  if(btnSP) btnSP.onclick=async()=>{
    const amount=Number((v('pa')||{}).value)||0;
    if(!amount){ toast('⚠️ रकम भरें!'); return; }
    const dir=(v('pdir')||{}).value||'out';
    btnSP.textContent='⏳ Save हो रहा है...'; btnSP.disabled=true;
    try {
      await savePocket({
        id:uid(), amount, dir,
        category:(v('pc')||{}).value||'अन्य',
        mode:(v('pm')||{}).value||'cash',
        date:(v('pda')||{}).value||today(),
        note:(v('pno')||{}).value?.trim()||''
      });
    } catch(e){ toast('Error: '+e.message); btnSP.textContent='✅ सेव करें'; btnSP.disabled=false; }
  };

  // Confirm Settle
  const btnCS=v('btn-cs');
  if(btnCS) btnCS.onclick=async()=>{
    const mode=mf.sm||'full';
    if(mode==='partial'&&!Number((v('sa')||{}).value)){ toast('⚠️ रकम भरें!'); return; }
    btnCS.textContent='⏳...'; btnCS.disabled=true;
    await settleUdhar(S.settleItem.id);
  };

  // Save Registry
  const btnSR=v('btn-sreg');
  if(btnSR) btnSR.onclick=async()=>{
    const clientName=(v('rc-name')||{}).value?.trim()||'';
    const clientCharge=Number((v('rc-charge')||{}).value)||0;
    const docDate=(v('rc-date')||{}).value||today();
    if(!clientName){ toast('⚠️ Client का नाम भरें!'); return; }
    if(!clientCharge){ toast('⚠️ Client से लिया amount भरें!'); return; }
    btnSR.textContent='⏳ Save हो रहा है...'; btnSR.disabled=true;
    try {
      const er=mf.editReg||{};
      await saveReg({
        id: er.id||uid(),
        clientName, clientCharge,
        clientMobile:(v('rc-mobile')||{}).value?.trim()||'',
        clientAddress:(v('rc-addr')||{}).value?.trim()||'',
        docType:(v('rc-dtype')||{}).value||'अन्य',
        propertyDesc:(v('rc-desc')||{}).value?.trim()||'',
        docDate,
        regNumber:(v('rc-regnum')||{}).value?.trim()||'',
        typingFee:Number((v('rc-typing')||{}).value)||0,
        registrationFee:Number((v('rc-regfee')||{}).value)||0,
        challanFee:Number((v('rc-challan')||{}).value)||0,
        dataEntryFee:Number((v('rc-data')||{}).value)||0,
        otherCost:Number((v('rc-other')||{}).value)||0,
        status:(v('rc-status')||{}).value||'pending',
        finalCopyGiven:(v('rc-copy')||{}).value==='1',
        notes:(v('rc-notes')||{}).value?.trim()||''
      });
    } catch(e){ toast('Error: '+e.message); btnSR.textContent='✅ Document Save करें'; btnSR.disabled=false; }
  };

  // Add Reminder
  const btnArem=v('btn-arem');
  if(btnArem) btnArem.onclick=async()=>{
    const name=(v('rn')||{}).value?.trim()||'';
    const dd=(v('rd')||{}).value||'';
    if(!name||!dd){ toast('⚠️ नाम और तारीख भरें!'); return; }
    await saveRem({id:uid(),name,amount:Number((v('ra')||{}).value)||0,dueDate:dd,note:(v('rno')||{}).value?.trim()||'',done:false});
    S.modal=null; render();
  };
}
</script>
</body>
</html>
